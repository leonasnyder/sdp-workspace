<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizons of Hope — SDP Workspace</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --blue:#f97316; --blue-dark:#7c2d12; --blue-light:#fff4ec;
  --green:#15803d; --green-light:#ecfdf3;
  --amber:#b45309; --amber-light:#fef7e7;
  --red:#dc2626; --red-light:#fef1f1;
  --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --bg:#f1f5f9; --card:#ffffff; --radius:14px;
  --shadow:0 1px 3px rgba(15,23,42,.07),0 1px 2px rgba(15,23,42,.05);
  --shadow-lg:0 8px 24px rgba(15,23,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#eef2f7 0%,var(--bg) 240px);color:var(--ink);font-size:15px;line-height:1.5}
header{background:linear-gradient(120deg,#9a3412 0%,#f97316 60%,#0ea5e9 145%);color:#fff;padding:18px 26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:0 2px 12px rgba(154,52,18,.25)}
header h1{font-size:20px;font-weight:700;letter-spacing:-.02em}
header .sub{font-size:12.5px;opacity:.85}
.hdr-btns{display:flex;gap:8px}
.hdr-btns button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}
.hdr-btns button:hover{background:rgba(255,255,255,.28)}
nav{display:flex;gap:4px;background:#fff;border-bottom:1px solid var(--line);padding:8px 16px;overflow-x:auto;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(15,23,42,.05)}
nav button{border:none;background:none;padding:9px 14px;font-size:13.5px;cursor:pointer;color:var(--muted);border-radius:10px;white-space:nowrap;font-weight:500;transition:all .15s}
nav button.active{color:#fff;background:var(--blue);font-weight:600;box-shadow:0 2px 8px rgba(249,115,22,.35)}
nav button:hover:not(.active){color:var(--blue-dark);background:var(--blue-light)}
main{padding:20px;max-width:1200px;margin:0 auto}
.view{display:none}
.view.active{display:block}
h2{font-size:20px;margin-bottom:4px;color:var(--blue-dark)}
h3{font-size:16px;margin:14px 0 8px;color:var(--blue-dark)}
.hint{color:var(--muted);font-size:13px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-lg)}
.grid{display:grid;gap:14px}
.grid.cols2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
.grid.cols3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.stat{text-align:center;padding:14px}
.stat .num{font-size:28px;font-weight:800;letter-spacing:-.02em;background:linear-gradient(120deg,var(--blue-dark),var(--blue));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat .lbl{font-size:12.5px;color:var(--muted);margin-top:2px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:10px 0 3px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
textarea{min-height:70px;resize:vertical}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue-light);border-color:var(--blue)}
button.btn{background:linear-gradient(120deg,var(--blue),#ea580c);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-size:14px;cursor:pointer;font-weight:600;margin-top:12px;box-shadow:0 2px 6px rgba(249,115,22,.3);transition:all .15s}
button.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(249,115,22,.4)}
button.btn.secondary{background:#fff;color:var(--blue);border:1px solid var(--blue)}
button.btn.danger{background:#fff;color:var(--red);border:1px solid var(--red)}
button.btn.small{padding:5px 10px;font-size:12.5px;margin-top:0}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:9px 8px;border-bottom:2px solid var(--line);background:#f8fafc;color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
tr:hover td{background:var(--blue-light)}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge.blue{background:var(--blue-light);color:var(--blue-dark)}
.badge.green{background:var(--green-light);color:var(--green)}
.badge.amber{background:var(--amber-light);color:var(--amber)}
.badge.red{background:var(--red-light);color:var(--red)}
.bar{background:#e5e9ef;border-radius:20px;height:14px;overflow:hidden;margin:4px 0}
.bar>div{height:100%;border-radius:20px;background:var(--green);transition:width .3s}
.bar>div.warn{background:var(--amber)}
.bar>div.over{background:var(--red)}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:13.5px;border-left:4px solid}
.alert.red{background:var(--red-light);border-color:var(--red)}
.alert.amber{background:var(--amber-light);border-color:var(--amber)}
.alert.green{background:var(--green-light);border-color:var(--green)}
.alert.blue{background:var(--blue-light);border-color:var(--blue)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.row>div{flex:1;min-width:130px}
.steps{list-style:none}
.steps li{display:flex;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line);align-items:flex-start}
.steps li:last-child{border-bottom:none}
.step-check{width:22px;height:22px;flex-shrink:0;margin-top:2px;accent-color:var(--green);cursor:pointer}
.step-body{flex:1}
.step-title{font-weight:600;font-size:14px}
.step-desc{font-size:12.5px;color:var(--muted);margin-top:2px}
.step-done .step-title{text-decoration:line-through;color:var(--muted)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.chip{background:var(--blue-light);color:var(--blue-dark);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid transparent}
.chip.active{background:var(--blue);color:#fff}
details{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:#fff;box-shadow:var(--shadow)}
summary{padding:12px 16px;cursor:pointer;font-weight:600;font-size:14px;border-radius:10px;transition:background .15s}
summary:hover{background:var(--blue-light)}
details>div{padding:4px 16px 14px}
.rc-meta{font-size:13px;color:var(--muted);margin:4px 0}
.rc-meta a{color:var(--blue)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.two-col{grid-template-columns:1fr}}
.muted{color:var(--muted);font-size:13px}
.right{text-align:right}
.mt0{margin-top:0}
.flexbtw{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.del-x{color:var(--red);cursor:pointer;font-weight:700;padding:0 6px;background:none;border:none;font-size:15px;line-height:1}
/* ── Accessibility ── */
:focus-visible{outline:3px solid #1d4ed8;outline-offset:2px;border-radius:4px}
.skip-link{position:absolute;left:-9999px;top:0;background:#fff;color:#1e40af;padding:10px 16px;font-weight:600;z-index:3000;border:2px solid #1d4ed8;border-radius:0 0 8px 0}
.skip-link:focus{left:0}
nav button.active{outline:none}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{transition-duration:.001ms!important;animation-duration:.001ms!important}
  .card:hover,button.btn:hover,nav button{transform:none!important}
}
#printArea{display:none}
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{display:block;position:absolute;top:0;left:0;width:100%;padding:24px;background:#fff}
  #printArea h1{font-size:20px;margin-bottom:2px}
  #printArea h2{font-size:16px;margin:14px 0 6px;color:#000;border-bottom:1px solid #999;padding-bottom:3px}
  #printArea table{font-size:12px}
  #printArea td,#printArea th{border:1px solid #bbb;padding:5px}
}
</style>
</head>

<script>
/* ================= STATE ================= */
const LS_KEY = "ifsdp_v1";
let DB = load();
function load(){
  try{ const d = JSON.parse(localStorage.getItem(LS_KEY)); if(d) return d; }catch(e){}
  return {clients:[], rcNotes:{}, seq:1};
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(DB)); if(typeof scheduleBackup==="function") scheduleBackup(); }
function uid(){ return "id"+(DB.seq++); }
function money(n){ return (n||0).toLocaleString("en-US",{style:"currency",currency:"USD"}); }
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function today(){ return new Date().toISOString().slice(0,10); }
function getClient(id){ return DB.clients.find(c=>c.id===id); }
function newClient(){ return {id:uid(),name:"",rc:"",coordinator:"",coordPhone:"",phone:"",email:"",planStart:"",planEnd:"",budget:0,fms:"",fmsModel:"",notes:"",
  steps:PROCESS_STEPS.map(()=>({done:false,date:"",note:""})),
  plan:[], expenses:[], pcp:{}, compliance:{}, goals:[]}; }

function markBackedUp(){ try{ localStorage.setItem("ifsdp_lastbackup", String(Date.now())); }catch(e){} }
function backupHealth(){
  const hasClients=(DB.clients||[]).length>0;
  let last=0; try{ last=+localStorage.getItem("ifsdp_lastbackup")||0; }catch(e){}
  const supported=!!(window.showDirectoryPicker && window.indexedDB);
  const auto=!!(typeof backupDir!=="undefined"&&backupDir);
  const needsReconnect=!auto && hasSavedDir;
  const days=last?Math.floor((Date.now()-last)/86400000):null;
  return {hasClients, supported, auto, needsReconnect, last, days, never:!last};
}
function exportData(){
  const blob = new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "if-sdp-backup-"+today()+".json";
  a.click();
  markBackedUp();
  if(typeof renderDashboard==="function") setTimeout(renderDashboard,50);
}
function importData(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ DB = JSON.parse(r.result); save(); markBackedUp(); renderAll(); alert("Data restored."); }catch(e){ alert("Could not read that file."); } };
  r.readAsText(f);
}

/* ================= BROWSER CHECK ================= */
(function(){
  if(window.showDirectoryPicker) return; /* Chrome/Edge — full features */
  try{ if(localStorage.getItem("ifsdp_browsernote")==="dismissed") return; }catch(e){}
  const isIpad=/iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1);
  const main=document.querySelector("main");
  const d=document.createElement("div");
  d.className="alert amber";
  d.id="browserNote";
  d.innerHTML='<strong>Heads up — you\'re on '+(isIpad?'an iPad/iPhone':'Safari or Firefox')+'.</strong> Everything you need still works here: clients, budgets, the spending plan, goals, compliance, forms, and generating documents. '+
  'The only things this browser can\'t do are the <em>automatic</em> Google-Drive backup and storing uploaded files inside the app — those need Chrome or Edge on a computer.'+
  '<div style="margin-top:6px;font-size:13px">✔ <strong>Do use the <span style="white-space:nowrap">⬇ Backup data</span></strong> button (top right) regularly to save your work — that works in every browser.'+
  (isIpad?' On iPad, your saved reports and documents open beautifully in the <strong>Google Drive</strong> or <strong>Files</strong> app.':'')+
  ' For the full experience, open this site in <strong>Chrome</strong> on a computer.</div>'+
  '<button class="btn small secondary" style="margin-top:8px" onclick="dismissBrowserNote()">Got it</button>';
  main.insertBefore(d,main.firstChild);
})();
function dismissBrowserNote(){ try{ localStorage.setItem("ifsdp_browsernote","dismissed"); }catch(e){} const n=document.getElementById("browserNote"); if(n) n.remove(); }
/* ================= NAV ================= */
document.getElementById("mainNav").addEventListener("click",e=>{
  if(e.target.dataset.view) showView(e.target.dataset.view);
});
function showView(v){

function upgradeA11y(){
  try{
    document.querySelectorAll(".del-x").forEach(b=>{
      if(!b.hasAttribute("tabindex")) b.setAttribute("tabindex","0");
      if(!b.hasAttribute("role")) b.setAttribute("role","button");
      if(!b.getAttribute("aria-label")) b.setAttribute("aria-label", b.getAttribute("title")||"Remove");
    });
  }catch(e){}
}

/* ================= HELPERS: budget math ================= */
function planTotal(c){ return c.plan.reduce((s,i)=>s+(+i.annual||0),0); }
function spentTotal(c){ return c.expenses.reduce((s,e)=>s+(+e.amount||0),0); }
function spentForItem(c,itemId){ return c.expenses.filter(e=>e.itemId===itemId).reduce((s,e)=>s+(+e.amount||0),0); }
function planYearPct(c){
  if(!c.planStart||!c.planEnd) return null;
  const s=new Date(c.planStart), e=new Date(c.planEnd), n=new Date();
  if(n<=s) return 0; if(n>=e) return 100;
  return Math.round((n-s)/(e-s)*100);
}
function utilization(c){ return c.budget>0 ? spentTotal(c)/c.budget*100 : 0; }
function clientAlerts(c){
  const out=[];
  const pt=planTotal(c);
  if(c.budget>0 && pt>c.budget) out.push({lv:"red",msg:"Spending plan ("+money(pt)+") exceeds the individual budget ("+money(c.budget)+")."});
  const yp=planYearPct(c), up=utilization(c);
  if(yp!==null && c.budget>0){
    if(up-yp>15) out.push({lv:"red",msg:"Spending pace is well ahead of the plan year ("+Math.round(up)+"% spent at "+yp+"% of year)."});
    else if(up-yp>5) out.push({lv:"amber",msg:"Spending slightly ahead of plan year ("+Math.round(up)+"% spent at "+yp+"% of year)."});
    if(yp-up>25 && yp>40) out.push({lv:"amber",msg:"Significant underspending ("+Math.round(up)+"% spent at "+yp+"% of year) — funds may go unused; consider a spending plan revision."});
  }
  if(c.planEnd){
    const days=Math.ceil((new Date(c.planEnd)-new Date())/86400000);
    if(days>=0&&days<=60) out.push({lv:"amber",msg:"Plan year ends in "+days+" days — start annual IPP review / budget renewal."});
    if(days<0) out.push({lv:"red",msg:"Plan year end date has passed — renew budget & spending plan."});
  }
  c.plan.forEach(i=>{
    const sp=spentForItem(c,i.id);
    if(+i.annual>0 && sp>+i.annual) out.push({lv:"red",msg:"Line over budget: "+i.desc+" ("+money(sp)+" of "+money(+i.annual)+")."});
  });
  return out;
}

  alerts.forEach(a=>html+=`<div class="alert ${a.lv}"><strong>${esc(a.name)||"Client"}:</strong> ${a.msg}</div>`);
  html+=`<h3>Clients at a glance</h3>`;
  if(!cs.length) html+=`<div class="card" style="border-left:4px solid var(--blue)">
    <h3 class="mt0">👋 Welcome — let's get you set up</h3>
    <p class="muted">Three steps to your first client:</p>
    <ol style="line-height:1.9;padding-left:20px">
      <li><strong>Add your first client</strong> — name, regional center, plan year, and budget. <button class="btn small" onclick="showView('clients');setTimeout(()=>editClient(null),50)">+ Add a client</button></li>
      <li><strong>Import the FMS report</strong> — in the Budget tab, drop in the spreadsheet or Spending Summary PDF and everything fills in automatically.</li>
      <li><strong>Turn on auto-backup</strong> — click <strong>📁 Set up auto-backup</strong> (top right) and point it at your Google Drive folder so your work is always saved.</li>
    </ol>
    <p class="muted">Every tab up top handles a piece of the SDP process — Spending Plan, Goals &amp; Asks, Compliance, PCP Builder, Forms, Documents. Explore any time.</p></div>`;
  else{
    html+=`<div class="card"><table><tr><th>Client</th><th>Regional center</th><th>Process</th><th>Budget used</th><th></th></tr>`;
    cs.forEach(c=>{
      const done=c.steps.filter(s=>s.done).length;
      const up=Math.min(utilization(c),100);
      const cls=utilization(c)>100?"over":(utilization(c)>85?"warn":"");

<script>
/* ================= CLIENT PICKER (shared) ================= */
const picked={process:null,budget:null,splan:null,goals:null,compliance:null,pcp:null,forms:null,docs:null};
function pickerHtml(view){
  if(!DB.clients.length) return `<div class="card">Add a client first (Clients tab).</div>`;
  if(!picked[view]||!getClient(picked[view])) picked[view]=DB.clients[0].id;
  return `<div class="chip-row">`+DB.clients.map(c=>
    `<span class="chip ${picked[view]===c.id?"active":""}" onclick="picked['${view}']='${c.id}';render('${view}')">${esc(c.name)}</span>`).join("")+`</div>`;
}

/* ================= PROCESS TRACKER ================= */
function renderProcess(){
  const el=document.getElementById("view-process");
  let html=`<h2>Process Tracker</h2><p class="hint">The SDP journey from first interest to ongoing facilitation. Check steps off per client; add dates and notes.</p>${pickerHtml("process")}`;
  const c=getClient(picked.process);
  if(c){
    const done=c.steps.filter(s=>s.done).length;
    html+=`<div class="card"><div class="flexbtw"><h3 class="mt0">${esc(c.name)} — ${done}/${PROCESS_STEPS.length} steps complete</h3>
    <span class="badge ${done===PROCESS_STEPS.length?"green":"blue"}">${done===PROCESS_STEPS.length?"Complete":"In progress"}</span></div>
    <div class="bar"><div style="width:${Math.round(done/PROCESS_STEPS.length*100)}%"></div></div><ul class="steps">`;
    PROCESS_STEPS.forEach((s,i)=>{
      const st=c.steps[i];
      html+=`<li class="${st.done?"step-done":""}">
      <input type="checkbox" class="step-check" ${st.done?"checked":""} onchange="toggleStep('${c.id}',${i},this.checked)">
      <div class="step-body"><div class="step-title">${i+1}. ${s.t}</div><div class="step-desc">${s.d}</div>
      <div class="row"><div><label>Date</label><input type="date" value="${esc(st.date)}" onchange="stepField('${c.id}',${i},'date',this.value)"></div>
      <div style="flex:3"><label>Note</label><input value="${esc(st.note)}" placeholder="e.g. orientation certificate received" onchange="stepField('${c.id}',${i},'note',this.value)"></div></div>
      </div></li>`;
    });
    html+=`</ul></div>`;
  }
  el.innerHTML=html;
}
function toggleStep(cid,i,val){ const c=getClient(cid); c.steps[i].done=val; if(val&&!c.steps[i].date)c.steps[i].date=today(); save(); renderProcess(); renderDashboard(); }
function stepField(cid,i,f,val){ getClient(cid).steps[i][f]=val; save(); }

/* ================= BUDGET & SPENDING ================= */
function renderBudget(){
  const el=document.getElementById("view-budget");
  let html=`<h2>Budget &amp; Spending</h2><p class="hint">Build the spending plan by budget category, log actual spending from FMS monthly statements, and generate client update reports.</p>${pickerHtml("budget")}`;
  const c=getClient(picked.budget);
  if(c){
    const pt=planTotal(c), sp=spentTotal(c), rem=c.budget-sp, up=utilization(c), yp=planYearPct(c);
    const cls=up>100?"over":(up>85?"warn":"");
    html+=`<div class="grid cols3">
      <div class="card stat"><div class="num">${money(+c.budget)}</div><div class="lbl">Certified annual budget</div></div>
      <div class="card stat"><div class="num">${money(pt)}</div><div class="lbl">Spending plan total ${pt>c.budget?'<span class="badge red">over budget</span>':'<span class="badge green">within budget</span>'}</div></div>
      <div class="card stat"><div class="num">${money(rem)}</div><div class="lbl">Remaining (budget − spent)</div></div>
    </div>
    <div class="card"><strong>Budget utilization:</strong> ${money(sp)} spent — ${Math.round(up)}% of budget${yp!==null?" at "+yp+"% of the plan year":""}

        const s2=spentForItem(c,i.id), left=(+i.annual||0)-s2;

        <td class="right">${money(s2)}</td><td class="right" style="color:${left<0?"var(--red)":"inherit"}">${money(left)}${i.pending>0?`<div class="muted" style="font-size:11px">+${money(i.pending)} pending</div>`:""}${perMonthLeft(c,left)?`<div class="muted" style="font-size:11px">≈${perMonthLeft(c,left)}</div>`:""}</td>
        <td><span class="del-x" onclick="delPlanItem('${c.id}','${i.id}')">✕</span></td></tr>`;
      });
    });
    html+=`</table>
    <div class="row"><div><label>Service code</label><select id="bp_code">${SERVICE_CODES.map(s=>`<option value="${s.code}">${s.code} — ${s.name}</option>`).join("")}</select></div>
    <div><label>Description / provider</label><input id="bp_desc" placeholder="e.g. Respite — ABC Agency"></div>
    <div><label>Annual amount ($)</label><input type="number" id="bp_amt" min="0" step="0.01"></div>
    <div><button class="btn" onclick="addPlanItem('${c.id}')">Add line</button></div></div></div>`;

    /* expenses */
    const itemOpts=c.plan.map(i=>`<option value="${i.id}">${esc(i.code)} — ${esc(i.desc)}</option>`).join("");
    html+=`<div class="card"><h3 class="mt0">Spending log</h3>
    <div class="row"><div><label>Date</label><input type="date" id="ex_date" value="${today()}"></div>
    <div style="flex:2"><label>Spending plan line</label><select id="ex_item">${itemOpts||'<option value="">— add plan lines first —</option>'}</select></div>
    <div><label>Amount ($)</label><input type="number" id="ex_amt" min="0" step="0.01"></div>
    <div style="flex:2"><label>Note</label><input id="ex_note" placeholder="e.g. May FMS statement"></div>
    <div><button class="btn" onclick="addExpense('${c.id}')">Log</button></div></div><table><tr><th>Date</th><th>Line</th><th class="right">Amount</th><th>Note</th><th></th></tr>`;
    [...c.expenses].sort((a,b)=>b.date.localeCompare(a.date)).forEach(e=>{
      const item=c.plan.find(i=>i.id===e.itemId);
      html+=`<tr><td>${esc(e.date)}</td><td>${item?esc(item.code+" — "+item.desc):"(deleted line)"}</td><td class="right">${money(+e.amount)}</td><td>${esc(e.note)}</td>
      <td><span class="del-x" onclick="delExpense('${c.id}','${e.id}')">✕</span></td></tr>`;
    });
    if(!c.expenses.length) html+=`<tr><td colspan="5" class="muted">Nothing logged yet.</td></tr>`;
    html+=`</table></div>`;
    html+=fmsImportCard(c);
    html+=`<button class="btn secondary" onclick="previewClientReport('${c.id}')">👁 Preview client report</button> <button class="btn" onclick="printClientReport('${c.id}')">🖨 Print client report</button> <button class="btn" onclick="reportPdf('${c.id}')">📄 PDF for email</button>`;
  }
  el.innerHTML=html;
}
function addPlanItem(cid){
  const c=getClient(cid);
  const code=v("bp_code"), desc=v("bp_desc"), amt=+v("bp_amt")||0;
  if(!desc){ alert("Add a description."); return; }
  const sc=SERVICE_CODES.find(s=>s.code===code);
  c.plan.push({id:uid(),code,cat:sc.cat,desc,annual:amt});
  save(); renderBudget(); renderDashboard();
}
function delPlanItem(cid,iid){ const c=getClient(cid); c.plan=c.plan.filter(i=>i.id!==iid); save(); renderBudget(); }
function addExpense(cid){
  const c=getClient(cid);
  const itemId=v("ex_item"), amt=+v("ex_amt")||0;
  if(!itemId||!amt){ alert("Pick a plan line and enter an amount."); return; }
  c.expenses.push({id:uid(),date:v("ex_date")||today(),itemId,amount:amt,note:v("ex_note")});
  save(); renderBudget(); renderDashboard();
}

function clientReportHtml(cid){
  const c=getClient(cid); if(!c) return "";
  const sp=spentTotal(c), rem=c.budget-sp, up=Math.round(utilization(c)), yp=planYearPct(c);

  <h2>Summary</h2>
  <table><tr><th>Certified annual budget</th><th>Spent to date</th><th>Remaining</th><th>% budget used</th><th>% of plan year elapsed</th></tr>
  <tr><td>${money(+c.budget)}</td><td>${money(sp)}</td><td>${money(rem)}</td><td>${up}%</td><td>${yp===null?"—":yp+"%"}</td></tr></table>
  ${(()=>{const py=planYearInfo(c);return py&&!py.over?`<p><strong>Budget effective ${fmtDate(py.start)} through ${fmtDate(py.end)} — ${py.remaining} of ${py.total} months remaining.</strong> Spending evenly, about ${money(py.remaining>0?rem/py.remaining:0)} is available per remaining month.</p>`:"";})()}
  <h2>Spending plan status</h2><table><tr><th>Category</th><th>Code</th><th>Service</th><th>Annual budget</th><th>Spent</th><th>Remaining</th><th>Per remaining month</th></tr>`;
  c.plan.forEach(i=>{
    const s2=spentForItem(c,i.id); const pm=perMonthLeft(c,(+i.annual||0)-s2);
    h+=`<tr><td>${i.cat}</td><td>${esc(i.code)}</td><td>${esc(i.desc)}</td><td>${money(+i.annual)}</td><td>${money(s2)}</td><td>${money((+i.annual||0)-s2)}</td><td>${pm?"≈"+pm:"—"}</td></tr>`;
  });
  h+=`</table>`;
  const al=clientAlerts(c);
  if(al.length){ h+=`<h2>Things to watch</h2><ul>`; al.forEach(a=>h+=`<li>${a.msg}</li>`); h+=`</ul>`; }
  h+=`<p style="margin-top:18px;font-size:11px">Figures reflect spending logged by the facilitator and should be reconciled against FMS monthly statements.</p>`;
  return h;
}

<script>
/* ================= COMPLIANCE CHECK ================= */
const COMP_ITEM_CRITERIA=[
 {k:"ipp",label:"Addresses a desired outcome identified in the IPP (WIC 4685.8(d)(3)(C)(i))"},
 {k:"generic",label:"Not available from generic services (schools, Medi-Cal, IHSS, etc.) (WIC 4685.8(d)(3)(C)(ii))"},
 {k:"ffp",label:"Eligible for federal financial participation (WIC 4685.8(d)(3)(C)(iii))"}
];
const COMP_PLAN_CHECKS=[
 {k:"attached",label:"A copy of the spending plan is attached to the participant's IPP"},
 {k:"timing",label:"Funds are distributed across the year to match the timing of anticipated expenditures, so services last the full plan year"},
 {k:"fmsline",label:"FMS is included in the spending plan (service code 315, 316, or 317)"},
 {k:"orientation",label:"Participant completed the required SDP orientation"},
 {k:"costeff",label:"Cost-effectiveness reviewed (per AB 143, DDS is defining 'cost effective' by directive — expected Aug 2026; check the latest DDS guidance)"}
];
function renderCompliance(){
  const el=document.getElementById("view-compliance");
  let html=`<h2>Spending Plan Compliance Check</h2><p class="hint">Run this before submitting a spending plan for regional center certification. Automatic checks run on the plan itself; confirm the rest with checkboxes.</p>${pickerHtml("compliance")}`;
  const c=getClient(picked.compliance);
  if(c){
    if(!c.compliance) c.compliance={};
    const pt=planTotal(c);
    /* automatic checks */
    const auto=[
      {ok:c.budget>0,msg:c.budget>0?"Certified individual budget entered: "+money(+c.budget):"No certified budget entered on the client record."},
      {ok:c.plan.length>0,msg:c.plan.length>0?"Spending plan has "+c.plan.length+" line(s).":"Spending plan is empty."},
      {ok:pt<=c.budget&&c.budget>0,msg:"Spending plan total "+money(pt)+(pt<=c.budget?" is within ":" EXCEEDS ")+"the individual budget "+money(+c.budget)+". Total may not exceed the budget (WIC 4685.8)."},
      {ok:c.plan.every(i=>+i.annual>0),msg:c.plan.every(i=>+i.annual>0)?"Every line identifies its cost.":"Some plan lines are missing a cost — each good/service must have its cost identified."},
      {ok:c.plan.some(i=>["315","316","317"].includes(i.code)),msg:c.plan.some(i=>["315","316","317"].includes(i.code))?"FMS line present.":"No FMS line (315/316/317) found in the plan."}
    ];
    html+=`<div class="card"><h3 class="mt0">Automatic checks</h3>`;
    auto.forEach(a=>html+=`<div class="alert ${a.ok?"green":"red"}">${a.ok?"✔":"✘"} ${a.msg}</div>`);
    html+=`</div>`;
    /* per-item certification criteria */
    html+=`<div class="card"><h3 class="mt0">Certification criteria — per plan line</h3><p class="muted">The regional center certifies each good/service against all three criteria. Confirm your documentation supports each one.</p>`;
    if(!c.plan.length) html+=`<p class="muted">Add spending plan lines in the Budget tab first.</p>`;
    c.plan.forEach(i=>{
      if(!c.compliance[i.id]) c.compliance[i.id]={};
      html+=`<details><summary>${esc(i.code)} — ${esc(i.desc)} ${COMP_ITEM_CRITERIA.every(cr=>c.compliance[i.id][cr.k])?'<span class="badge green">ready</span>':'<span class="badge amber">incomplete</span>'}</summary><div>`;
      COMP_ITEM_CRITERIA.forEach(cr=>{
        html+=`<label style="display:flex;gap:8px;align-items:flex-start;font-weight:400;font-size:13.5px;margin:8px 0">
        <input type="checkbox" style="width:18px;height:18px;accent-color:var(--green)" ${c.compliance[i.id][cr.k]?"checked":""}
        onchange="compItem('${c.id}','${i.id}','${cr.k}',this.checked)"> ${cr.label}</label>`;
      });
      html+=`</div></details>`;
    });
    html+=`</div>`;
    /* whole-plan checklist */
    if(!c.compliance._plan) c.compliance._plan={};
    html+=`<div class="card"><h3 class="mt0">Whole-plan checklist</h3>`;
    COMP_PLAN_CHECKS.forEach(cr=>{
      html+=`<label style="display:flex;gap:8px;align-items:flex-start;font-weight:400;font-size:13.5px;margin:8px 0">
      <input type="checkbox" style="width:18px;height:18px;accent-color:var(--green)" ${c.compliance._plan[cr.k]?"checked":""}
      onchange="compPlan('${c.id}','${cr.k}',this.checked)"> ${cr.label}</label>`;
    });
    html+=`</div>`;
    const allAuto=auto.every(a=>a.ok);
    const allItems=c.plan.length&&c.plan.every(i=>COMP_ITEM_CRITERIA.every(cr=>c.compliance[i.id]&&c.compliance[i.id][cr.k]));
    const allPlan=COMP_PLAN_CHECKS.every(cr=>c.compliance._plan[cr.k]);
    html+= (allAuto&&allItems&&allPlan)
      ? `<div class="alert green"><strong>✔ Ready for submission.</strong> All checks pass — submit to ${esc(c.rc)||"the regional center"} for certification.</div>`
      : `<div class="alert amber"><strong>Not ready yet.</strong> Resolve the items above before submitting for certification.</div>`;
  }
  el.innerHTML=html;
}

function renderResources(){
  const el=document.getElementById("view-resources");
  el.innerHTML=`<h2>Resources</h2><p class="hint">Key statewide references for the Self-Determination Program.</p>
  <div class="card"><h3 class="mt0">Official</h3>
  <p>• <a href="https://www.dds.ca.gov/initiatives/sdp/" target="_blank" rel="noopener">DDS — Self-Determination Program</a> — program home, directives &amp; updates</p>
  <p>• <a href="https://www.dds.ca.gov/initiatives/sdp/frequently-asked-questions/" target="_blank" rel="noopener">DDS — SDP FAQs</a></p>
  <p>• <a href="https://www.dds.ca.gov/initiatives/sdp/resources-and-tools/" target="_blank" rel="noopener">DDS — SDP Resources &amp; Tools</a> (service definitions, budget/spending plan tools)</p>
  <p>• <a href="https://codes.findlaw.com/ca/welfare-and-institutions-code/wic-sect-4685-8/" target="_blank" rel="noopener">WIC § 4685.8</a> — the SDP statute</p></div>
  <div class="card"><h3 class="mt0">Current service rates (DDS)</h3>
  <p>• <a href="https://www.dds.ca.gov/rc/vendor-provider/vendorization-process/vendor-rates/" target="_blank" rel="noopener">DDS Reimbursement Rates</a> — the main rates page (rates effective Jan 1, 2026; check here first)</p>
  <p>• <a href="https://www.dds.ca.gov/rc/vendor-provider/rate-models/" target="_blank" rel="noopener">Complete rate models</a> — detailed rates by service code, summarized per regional center</p>
  <p>• <a href="https://www.dds.ca.gov/wp-content/uploads/2023/06/SDP-FMS-Monthly-Rates-2.pdf" target="_blank" rel="noopener">SDP FMS monthly rates (PDF)</a> — the flat monthly FMS fees by model &amp; number of services</p>
  <p>• <a href="https://www.dds.ca.gov/wp-content/uploads/2022/07/Self_Directed_Support_Services_Rates_082022.pdf" target="_blank" rel="noopener">Self-Directed Supported Services rates by RC (PDF)</a> — the code 099 hourly rate for pre-enrollment / General SD Supports work</p>
  <p>• <a href="https://www.dds.ca.gov/rc/vendor-provider/rate-changes/" target="_blank" rel="noopener">Rate Changes</a> — announcements when rates are updated</p>
  <p class="muted">Rates change (typically each January) — always confirm against the current schedule before quoting costs in a spending plan.</p></div>
  <div class="card"><h3 class="mt0">Community</h3>
  <p>• <a href="https://sdp-resource-center.org" target="_blank" rel="noopener">SDP Resource Center</a> — step-by-step overview &amp; directive library</p>
  <p>• <a href="https://disabilityvoicesunited.org/interchange/self-determination/" target="_blank" rel="noopener">Disability Voices United — Self-Determination Interchange</a></p>
  <p>• <a href="https://scdd.ca.gov" target="_blank" rel="noopener">State Council on Developmental Disabilities</a> — statewide SDP advisory committee</p></div>
  <div class="card"><h3 class="mt0">Independent Facilitator quick reference</h3>
  <p><strong>Role (WIC 4685.8):</strong> chosen and directed by the participant to help develop the person-centered plan and spending plan, coordinate the IPP meeting, and support implementation. May not also be the participant's FMS or a provider of other paid services to that participant (conflict of interest).</p>
  <p><strong>IF payment:</strong> pre-enrollment supports are RC-paid outside the budget — Initial PCP up to $1,000 (code 024) and General SD Supports up to 40 hrs at the DDS-set rate (code 099 / 099-PDS, per the July 2024 directive). After enrollment, IF services are paid from the participant's individual budget (WIC 4685.8(c)(2), service code 340) — include the line in the spending plan.</p>
  <p><strong>FMS models:</strong> Bill Payer / Fiscal Agent (315) · Co-Employer (316) · Sole Employer / Fiscal-Employer Agent (317). Flat monthly fee per the state rate schedule.</p>
  <p><strong>Spending plan rules:</strong> total ≤ certified budget · every item costed &amp; coded · items must address IPP outcomes, be unavailable from generic services, and be FFP-eligible · attach plan to IPP · distribute funds to last the full year.</p>
  <p><strong>Watch for 2026:</strong> AB 143 requires DDS to define "cost effective" by directive (due Aug 1, 2026) — spending plans will be reviewed against it. Check DDS Program Updates.</p></div>
  <div class="card"><h3 class="mt0">📐 How to size hours &amp; units (what to put in the "ask")</h3>
  <p class="muted">SDP is needs-based — there's no fixed state number. The quantity comes from the participant's actual support needs (from the PCP/IPP and any assessments), which you convert into an annual amount and then price. The 🧮 calculator on each service in <strong>Goals, Asks &amp; Justification</strong> runs this math for you.</p>
  <p style="margin-bottom:2px"><strong>1 · Annual quantity</strong> — the number that goes in the ask</p>
  <p style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;background:var(--bg);padding:8px 10px;border-radius:6px;margin:4px 0">Hourly:&nbsp;&nbsp;&nbsp;annual hours = hours per session × sessions per week × weeks per year<br>Unit-based: annual units = units per period × periods per year</p>
  <p class="muted">Use 52 weeks for year-round support, or the real number for seasonal / partial-year needs (e.g., 40 school weeks, or a 12-week ramp-up). Thinking monthly? Weeks per month ≈ 4.33 (52 ÷ 12), so hrs/week × 4.33 × 12, or simply hrs/month × 12. Examples: 4 respite days/quarter × 4 = 16 days/yr · 3 trips/week × 52 = 156 trips/yr · 2 OT sessions/month × 12 = 24 sessions/yr.</p>
  <p style="margin-bottom:2px"><strong>2 · Cost</strong> — check it fits the budget</p>
  <p style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;background:var(--bg);padding:8px 10px;border-radius:6px;margin:4px 0">annual cost = annual units × loaded rate</p>
  <p class="muted">For an employed worker the loaded rate = wage × (1 + employer burden %) + FMS fee. The <strong>Spending Plan</strong> tab already computes this as the "true wage per hour," so you don't have to do the burden math by hand.</p>
  <p style="margin-bottom:2px"><strong>3 · Which direction to work</strong></p>
  <p class="muted"><strong>Needs-first</strong> (best for justification): set the hours from need, cost each service, add them up, and confirm the total is at or under the certified budget. Over budget? That's where you prioritize or request a budget revision.<br><strong>Budget-first</strong> (when a line is capped): affordable units = dollars allocated to that line ÷ loaded rate.</p>
  <p><strong>Worked example — job coaching that fades:</strong> 10 hrs/week for the first 12 weeks, then 4 hrs/week for the remaining 40 → (10 × 12) + (4 × 40) = <strong>280 hrs/year</strong>. At a loaded $25/hr → 280 × $25 = <strong>$7,000/year</strong>. Size each phase separately, then add them.</p>
  <p><strong>Make the number defensible:</strong> tie it to a provider or assessment recommendation (and attach it), to the goal's frequency (e.g., 2 community outings/week <em>because</em> the outcome is building relationships — not a round guess), and net out anything IHSS or a generic resource already covers so you're not duplicating.</p>
  <p class="muted" style="font-size:12px">This is planning guidance, not a rate quote or legal advice — your regional center's SDP unit has the final say on what it will certify.</p></div>
  <div class="card"><h3 class="mt0">Your data</h3>
  <p class="muted">Everything you enter lives only in this browser (localStorage) — nothing is sent anywhere. Turn on <strong>📁 auto-backup</strong> (header) to save automatically to a folder you designate — e.g. Google Drive for Desktop &gt; IF Clients 2026 — with one subfolder per client (data file + readable budget summary). Works in Chrome/Edge; after reopening the app, one click reconnects the folder. <strong>Backup data / Restore</strong> still work manually anywhere.</p></div>
  <div class="card" style="border-left:4px solid var(--amber)"><h3 class="mt0">🔐 Privacy &amp; confidentiality — please read</h3>
  <p class="muted">This app stores sensitive client information — names, budgets, and any medical or behavioral detail you enter or import from IPPs and PCPs. Handle it with the same care you'd give paper client files:</p>
  <ul style="color:var(--muted);font-size:13px;line-height:1.6">
    <li><strong>Where it lives:</strong> only in your browser and any backup folder you choose (e.g. your Google Drive). It is <em>not</em> stored on a shared server, and other users of the website can't see your data.</li>
    <li><strong>What this is — and isn't:</strong> this is a personal record-keeping tool, like a private spreadsheet. The sign-in gate protects the front door, but data is <strong>not encrypted at rest</strong> and this is <strong>not a HIPAA-certified system</strong>. Don't treat it as a substitute for a covered records system if your work requires one.</li>
    <li><strong>Protect your devices:</strong> use a password/lock on any computer where you open the app, keep your Google account secured (2-step verification), and store exported backup files somewhere private — not a shared or public folder.</li>
    <li><strong>Sharing with families or the RC:</strong> only share the specific report or document needed, and make sure your client's consent-to-share form (Forms tab) covers it.</li>
    <li><strong>Before inviting others:</strong> remember each person keeps their own separate copy of whatever they enter; there's no shared client database, and you as admin can't see their data.</li>
  </ul>
  <p class="muted">Questions about your obligations? Check with your regional center or a privacy professional — this notice is guidance, not legal advice.</p></div>`;
}

/* Plain-language briefing on each generic resource: what it is + what the facilitator should check and document before SDP will fund the item. */
const GENERIC_GUIDE = {
 ihss:{name:"IHSS (In-Home Supportive Services)",what:"County program that pays a caregiver for personal care (bathing, dressing, meals) and domestic chores done FOR the person.",do:"Confirm the person's current authorized hours and request the annual Notice of Action (NOA). SDP can't pay for hours IHSS already covers — but it CAN fund skill-teaching (which IHSS doesn't do) or a need IHSS won't authorize. Attach the NOA or assessment."},
 dor:{name:"Department of Rehabilitation (DOR)",what:"State agency that funds employment services — vocational assessment, job development, placement, and time-limited job coaching — for people with a work goal.",do:"Apply and open a DOR case first. SDP funds employment supports only once DOR has closed or denied the case, or its services are exhausted/insufficient for ongoing support. Attach the DOR plan (IPE), closure letter, or denial."},
 medical:{name:"Medi-Cal / managed-care plan",what:"Covers medically necessary services — therapies (OT/PT/speech), durable medical equipment (DME), nursing, and some mental health.",do:"Have the doctor request it through Medi-Cal, then get the denial, Explanation of Benefits (EOB), or proof the benefit is exhausted before asking SDP. Attach it."},
 ccs:{name:"California Children's Services (CCS)",what:"Covers therapies and equipment for eligible children with qualifying medical conditions.",do:"For participants under 21, check CCS eligibility first and note the result."},
 mentalhealth:{name:"County mental health / Medi-Cal behavioral health",what:"County plans cover mental health treatment and some behavioral services.",do:"Make a referral and document that county services are unavailable, waitlisted, or not competent for developmental-disability-specific needs. Attach the referral outcome."},
 school:{name:"School district / IEP / transition services",what:"Districts must provide services in a student's IEP — including transition and some therapies — through age 21.",do:"If the participant is a student, the district (not SDP) funds IEP services. Document that the need falls outside the IEP or that the person has exited school."},
 adulted:{name:"Adult education & community college (DSPS)",what:"Free/low-cost classes and Disabled Students Programs & Services at community colleges.",do:"Check whether the class or support is available through DSPS or adult ed before requesting SDP funds."},
 finaid:{name:"Financial aid & fee waivers",what:"FAFSA, College Promise/fee waivers, and scholarships that cover tuition.",do:"Apply for aid first; SDP covers only disability-related costs aid won't. Attach the award or denial."},
 transit:{name:"Public transit & ADA paratransit",what:"Local fixed-route transit and ADA paratransit (e.g., Access) for people who can't use fixed-route.",do:"Check paratransit eligibility and whether the person can travel safely and independently. Document why it's unavailable, insufficient, or unusable."},
 housing:{name:"Housing programs (Section 8 / HUD / local authority)",what:"Rental subsidies and accessible-housing programs.",do:"These cover rent/subsidy — not individualized, disability-related move-in help. Note which housing programs you checked."},
 community:{name:"Natural & community supports",what:"Free community programs, recreation, classes, family, friends, and volunteers.",do:"Note what you tried. SDP funds paid 1:1 support only where natural/community supports can't meet the need."},
 none:{name:"No generic source responsible",what:"This is a disability-specific need with no public program obligated to provide it.",do:"State plainly that no generic resource covers it and briefly say why the need is disability-related."}
};
function goalMigrate(c){ if(!c.goals) c.goals=[]; }
function renderGoals(){
  const el=document.getElementById("view-goals");
  let html=`<h2>Goals, Asks &amp; Justification</h2><p class="hint">Turn PCP goals into concrete budget requests: pick a life area, get suggested services with the service code, what to ask for, and ready-to-edit justification language built on the three certification criteria. Track results as goals progress.</p>${pickerHtml("goals")}`;
  const c=getClient(picked.goals);
  if(c){
    goalMigrate(c);
    html+=`<div class="card"><h3 class="mt0">Add a goal</h3><div class="row">
    <div style="flex:2"><label>Goal / desired outcome (from the PCP)</label><input id="g_title" placeholder="e.g. Maria wants a part-time job in an animal shelter"></div>
    <div><label>Life area</label><select id="g_area">${Object.keys(LIFE_AREAS).map(a=>`<option>${a}</option>`).join("")}</select></div>
    <div><button class="btn" onclick="addGoal('${c.id}')">Add goal</button></div></div></div>`;
    if(!c.goals.length) html+=`<div class="card muted">No goals yet — add the outcomes from the PCP above.</div>`;
    c.goals.forEach(g=>{
      const linked=c.plan.filter(i=>i.goalId===g.id);
      const spent=linked.reduce((s,i)=>s+spentForItem(c,i.id),0);
      const asked=linked.reduce((s,i)=>s+(+i.annual||0),0);
      const sug=LIFE_AREAS[g.area]||[];
      html+=`<div class="card"><div class="flexbtw"><h3 class="mt0">🎯 ${esc(g.title)}</h3>
      <span><span class="badge blue">${esc(g.area)}</span>
      <select style="width:auto;display:inline-block;margin-left:6px" onchange="goalField('${c.id}','${g.id}','status',this.value)">
      ${["Planned","In progress","Achieved","Paused"].map(s=>`<option ${g.status===s?"selected":""}>${s}</option>`).join("")}</select>
      <span class="del-x" onclick="delGoal('${c.id}','${g.id}')">✕</span></span></div>`;
      if(linked.length){
        html+=`<p class="muted">Tied to budget: ${linked.map(i=>esc(i.code)+" — "+esc(i.desc)).join(" · ")} | requested ${money(asked)}/yr · spent ${money(spent)}</p>`;
      }
      html+=`<label>Results so far (what changed for the person — used in reports and renewals)</label>
      <textarea placeholder="e.g. Volunteering 2 days/week since March; interview scheduled at shelter. Job coach hours were essential." onchange="goalField('${c.id}','${g.id}','result',this.value)">${esc(g.result||"")}</textarea>
      <details><summary>💡 Suggested services for "${esc(g.area)}" (${sug.length})</summary><div>`;
      sug.forEach((s,si)=>{
        const sc=SERVICE_CODES.find(x=>x.code===s.code);
        html+=`<div class="card" style="background:var(--blue-light)">
        <strong>${s.code} — ${sc?sc.name:""}</strong> <span class="badge blue">${sc?sc.cat:""}</span>
        <p class="muted" style="margin:6px 0"><strong>What to ask for:</strong> ${esc(s.ask)}</p>
        ${genericGuidance(s)}
        <div style="background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 12px;margin:8px 0">
          <div style="font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:3px">Ready-to-paste ask for the report</div>
          <p style="margin:0;font-size:13px">${esc(justText(c,g,s))}</p>
        </div>
        <div style="background:#fff;border:1px dashed var(--blue);border-radius:8px;padding:8px 12px;margin:8px 0">
          <div style="font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:5px">🧮 Size it — hours/units → annual → cost</div>
          <div class="row" style="gap:8px">
            <div><label>Amount</label><input type="number" min="0" step="0.5" id="cq_${g.id}_${si}" placeholder="10" oninput="calcGoalUnits('${g.id}',${si})"></div>
            <div><label>Per</label><select id="cp_${g.id}_${si}" onchange="setGoalPeriod('${g.id}',${si})"><option value="week">week</option><option value="month">month</option><option value="quarter">quarter</option><option value="year">year</option></select></div>
            <div><label>× periods/yr</label><input type="number" min="0" step="1" id="cn_${g.id}_${si}" value="52" oninput="calcGoalUnits('${g.id}',${si})"></div>
            <div><label>Loaded $/unit</label><input type="number" min="0" step="0.01" id="cr_${g.id}_${si}" placeholder="25" oninput="calcGoalUnits('${g.id}',${si})"></div>
          </div>
          <div id="co_${g.id}_${si}" style="margin:6px 0 0;font-size:13px;color:var(--blue-dark)"></div>
          <div class="muted" style="font-size:11px;margin-top:3px">Loaded rate = the "true wage per hour" from the Spending Plan (wage + employer taxes + FMS), or your provider's rate. For a fading schedule, size each phase separately and add them.</div>
        </div>
        <div class="row"><div><label>Annual amount ($) <span style="font-weight:400">— fills from calculator, or type it</span></label><input type="number" id="ga_${g.id}_${si}" min="0" step="0.01"></div>
        <div style="flex:2"><label>Provider / detail (optional)</label><input id="gp_${g.id}_${si}" placeholder="provider name, rate detail"></div>
        <div><button class="btn small" onclick="addGoalService('${c.id}','${g.id}',${si})">Add to spending plan</button></div></div></div>`;
      });
      html+=`</div></details></div>`;
    });
    if(c.goals.length) html+=`<button class="btn" onclick="printGoalReport('${c.id}')">🖨 Budget Request &amp; Justification report</button>
    <button class="btn secondary" onclick="printResultsReport('${c.id}')">🖨 Goal Results report</button>`;
  }
  el.innerHTML=html;
}
function justText(c,g,s){
  const sc=SERVICE_CODES.find(x=>x.code===s.code);
  const nm=sc?sc.name:"This service";
  const genClause=s.gen.replace(/\s*\((?:attach|document)[^)]*\)/gi,"").trim();
  return `${nm} (code ${s.code}) is requested to ${s.fn} — directly supporting ${c.name}'s IPP outcome "${g.title}." Generic resources cannot meet this need: ${genClause}. It is an eligible SDP service claimable for federal financial participation. Requested: ${s.ask}.`;
}
/* Goals-card calculator: amount per period × periods/year = annual quantity; × loaded rate = annual cost. Fills the Annual amount field. */
function setGoalPeriod(gid,si){
  const sel=document.getElementById(`cp_${gid}_${si}`), cn=document.getElementById(`cn_${gid}_${si}`);
  const map={week:52,month:12,quarter:4,year:1};
  if(sel&&cn) cn.value=map[sel.value]||"";
  calcGoalUnits(gid,si);
}
function calcGoalUnits(gid,si){
  const gv=id=>{const e=document.getElementById(id); return e?(+e.value||0):0;};
  const qty=gv(`cq_${gid}_${si}`), nper=gv(`cn_${gid}_${si}`), rate=gv(`cr_${gid}_${si}`);
  const annual=qty*nper, cost=annual*rate;
  const annualStr=(annual%1)?annual.toFixed(1):String(annual);
  const out=document.getElementById(`co_${gid}_${si}`);
  if(out){
    if(!qty||!nper) out.innerHTML="";
    else out.innerHTML=`= <strong>${annualStr}</strong> per year`+(rate?` × ${money(rate)} = <strong>${money(cost)}/yr</strong>`:` <span class="muted">(add a loaded rate to get the $)</span>`);
  }
  const amt=document.getElementById(`ga_${gid}_${si}`);
  if(amt && qty && nper && rate) amt.value=cost.toFixed(2);
}
/* Detailed, on-screen briefing for the facilitator: which generic programs to check for THIS service and what to document. Not included in the report. */
function genericGuidance(s){
  const items=(s.gk||[]).map(k=>{ const g=GENERIC_GUIDE[k]; if(!g) return ""; return `<li style="margin:6px 0"><strong>${esc(g.name)}</strong> — ${esc(g.what)}<br><span style="color:var(--blue-dark)"><strong>What to do:</strong></span> ${esc(g.do)}</li>`; }).join("");
  return `<details style="margin:6px 0"><summary style="font-weight:600;font-size:13px;color:var(--blue-dark)">📋 Before you ask — generic resources to check &amp; document</summary>
  <div style="padding:6px 2px">
  <p class="muted" style="margin:4px 0">SDP is the <strong>payer of last resort</strong>. Before the regional center certifies this item, you have to show the need can't be met by a "generic resource" — a public program already responsible for it (WIC §4685.8(d)(3)(C)(ii)). Check the sources below, then keep the paperwork.</p>
  <ul style="margin:6px 0 4px 18px;font-size:12.5px;line-height:1.5;color:var(--ink)">${items}</ul>
  <p class="muted" style="margin:6px 0 0;font-size:12px"><strong>Short version for the report:</strong> ${esc(s.gen)}. Attach any denial letters, NOAs, EOBs, or closure letters that back this up.</p>
  </div></details>`;
}
function addGoal(cid){
  const c=getClient(cid); goalMigrate(c);
  const t=v("g_title"); if(!t){alert("Describe the goal first.");return;}
  c.goals.push({id:uid(),title:t,area:v("g_area"),status:"Planned",result:""});
  save(); renderGoals();
}
function delGoal(cid,gid){ const c=getClient(cid); if(confirm("Remove this goal? (Linked budget lines stay.)")){c.goals=c.goals.filter(g=>g.id!==gid); save(); renderGoals();} }
function goalField(cid,gid,f,val){ const c=getClient(cid); const g=c.goals.find(x=>x.id===gid); g[f]=val; save(); if(f==="status")renderGoals(); }
function addGoalService(cid,gid,si){
  const c=getClient(cid); const g=c.goals.find(x=>x.id===gid);
  const s=LIFE_AREAS[g.area][si]; const sc=SERVICE_CODES.find(x=>x.code===s.code);
  const amt=+document.getElementById(`ga_${gid}_${si}`).value||0;
  const prov=document.getElementById(`gp_${gid}_${si}`).value.trim();
  c.plan.push({id:uid(),code:s.code,cat:sc.cat,desc:(prov||sc.name)+" — goal: "+g.title.slice(0,40),annual:amt,goalId:gid,just:justText(c,g,s)});
  save(); renderGoals(); renderBudget(); renderDashboard();
  alert("Added to the spending plan ("+money(amt)+"/yr). Set the exact amount in the Budget tab if needed.");
}
function printGoalReport(cid){
  const c=getClient(cid); goalMigrate(c);
  let h=`<h1>SDP Budget Request &amp; Justification — ${esc(c.name)}</h1>
  <p>Prepared ${new Date().toLocaleDateString()} by the Independent Facilitator · Regional center: ${esc(c.rc)} · Plan year ${esc(c.planStart)} to ${esc(c.planEnd)} · Certified budget: ${money(+c.budget)}</p>
  <p>Each request below is tied to an IPP desired outcome and addresses the certification criteria of WIC §4685.8: it (i) addresses the individual's desired outcomes in the IPP, (ii) is not available from generic services, and (iii) is eligible for federal financial participation.</p>`;
  c.goals.forEach((g,n)=>{
    const linked=c.plan.filter(i=>i.goalId===g.id);
    h+=`<h2>Goal ${n+1}: ${esc(g.title)}</h2><p><em>Life area: ${esc(g.area)} · Status: ${esc(g.status||"Planned")}</em></p>`;
    if(!linked.length){ h+=`<p>(No budget lines linked yet.)</p>`; return; }
    h+=`<table><tr><th>Code</th><th>Service</th><th>Annual request</th></tr>`;
    linked.forEach(i=>h+=`<tr><td>${esc(i.code)}</td><td>${esc(i.desc)}</td><td>${money(+i.annual)}</td></tr>`);
    h+=`</table>`;
    linked.forEach(i=>{ if(i.just) h+=`<p style="font-size:12px"><strong>${esc(i.code)} justification:</strong> ${esc(i.just)}</p>`; });
  });
  const tot=c.plan.filter(i=>i.goalId).reduce((s,i)=>s+(+i.annual||0),0);
  h+=`<h2>Total of goal-linked requests: ${money(tot)}</h2>
  <p style="font-size:11px">Prepared with the participant's direction and consent. Supporting documentation (denials, bids, assessments) available on request.</p>`;
  doPrint(h);
}
function printResultsReport(cid){
  const c=getClient(cid); goalMigrate(c);
  let h=`<h1>Goal Results Report — ${esc(c.name)}</h1>
  <p>Prepared ${new Date().toLocaleDateString()} · Plan year ${esc(c.planStart)} to ${esc(c.planEnd)} · For annual IPP review / renewal</p>
  <table><tr><th>Goal</th><th>Status</th><th>Services used (codes)</th><th>Requested $</th><th>Spent $</th><th>Results</th></tr>`;
  c.goals.forEach(g=>{
    const linked=c.plan.filter(i=>i.goalId===g.id);
    const asked=linked.reduce((s,i)=>s+(+i.annual||0),0);
    const spent=linked.reduce((s,i)=>s+spentForItem(c,i.id),0);
    h+=`<tr><td>${esc(g.title)}</td><td>${esc(g.status||"Planned")}</td><td>${linked.map(i=>esc(i.code)).join(", ")||"—"}</td>
    <td>${money(asked)}</td><td>${money(spent)}</td><td>${esc(g.result||"—")}</td></tr>`;
  });
  h+=`</table><p style="font-size:11px">Use at the annual IPP meeting to show how the budget produced outcomes and to justify renewal or revision of services.</p>`;
  doPrint(h);
}
</script>
<script>
/* ================= FMS PORTAL ACCESS & CLIENT UPDATES ================= */
function fmsCard(c){
  if(!c.fmsPortal) c.fmsPortal={url:"",day:""};
  /* scrub any previously-stored login credentials — we no longer keep these */
  let scrubbed=false;
  ["user","pass","consent"].forEach(k=>{ if(c.fmsPortal[k]!==undefined){ delete c.fmsPortal[k]; scrubbed=true; } });
  if(scrubbed) save();
  const f=c.fmsPortal;
  return `<div class="card"><h3 class="mt0">FMS &amp; monthly update</h3>
  <p class="muted">FMS: <strong>${esc(c.fms||"—")}</strong>${c.fmsModel?" ("+esc(c.fmsModel)+")":""}${c.fmsPct?" · charges "+esc(String(c.fmsPct))+"%":""} — set the provider, model &amp; fee % on the <strong>Clients</strong> tab (the % flows into the Spending Plan). No login is stored here; to track spending, upload the FMS's emailed report in the Budget tab.</p>
  <div class="row">
    <div style="flex:2"><label>FMS portal link (optional bookmark)</label><input value="${esc(f.url)}" placeholder="https://portal.yourfms.com" onchange="fmsField('${c.id}','url',this.value)"></div>
    <div><label>Statement day (optional)</label><input value="${esc(f.day)}" placeholder="e.g. 5th" onchange="fmsField('${c.id}','day',this.value)"></div>
  </div>
  ${f.url?`<button class="btn secondary" onclick="window.open('${esc(f.url)}','_blank')">🔗 Open FMS portal</button>`:""}
  <button class="btn" onclick="emailUpdate('${c.id}')">✉ Email budget update to client</button>
  <button class="btn secondary" onclick="copyUpdate('${c.id}')">Copy update text</button>
  <p class="muted" style="margin-top:6px">Monthly routine: get the FMS statement → import it (Budget tab) → the app flags over/under pace → send the update.</p></div>`;
}
function fmsField(cid,k,val){ const c=getClient(cid); if(!c.fmsPortal)c.fmsPortal={}; c.fmsPortal[k]=val; save(); if(k==="url")renderBudget(); }
function updateText(c){
  const sp=spentTotal(c), rem=c.budget-sp, up=Math.round(utilization(c)), yp=planYearPct(c);
  let t=`Hi ${c.name.split(" ")[0]},\n\nHere is your SDP budget update as of ${new Date().toLocaleDateString()}:\n\n`;
  t+=`• Annual budget: ${money(+c.budget)}\n• Spent to date: ${money(sp)} (${up}% of budget${yp!==null?", at "+yp+"% of the plan year":""})\n• Remaining: ${money(rem)}\n`;
  const py=planYearInfo(c);
  if(py&&!py.over) t+=`• Budget effective: ${fmtDate(py.start)} to ${fmtDate(py.end)} — ${py.remaining} month${py.remaining===1?"":"s"} left\n• That's about ${money(py.remaining>0?rem/py.remaining:0)} available per remaining month\n`;
  t+=`\nBy service:\n`;
  c.plan.forEach(i=>{ const s2=spentForItem(c,i.id); const pm=perMonthLeft(c,(+i.annual||0)-s2);
    t+=`• ${i.code} ${i.desc}: ${money(s2)} of ${money(+i.annual)} — ${money((+i.annual||0)-s2)} left${pm?", ≈"+pm:""}\n`; });
  const al=clientAlerts(c);
  if(al.length){ t+=`\nThings to watch:\n`; al.forEach(a=>t+=`• ${a.msg}\n`); }
  else t+=`\nYou are on track — nice pacing!\n`;

<script>
/* ================= AUTO-BACKUP TO DESIGNATED FOLDER ================= */
/* Uses the File System Access API (Chrome/Edge). Pick a folder once — e.g. your
   Google Drive for Desktop folder > "IF Clients 2026" — and every change is saved
   automatically to <folder>/<Client Name>/ . Google Drive then syncs it to the cloud. */
let backupDir = null, backupTimer = null, hasSavedDir = false;

function idb(){ return new Promise((res,rej)=>{ const r=indexedDB.open("ifsdp_fs",1);
  r.onupgradeneeded=()=>r.result.createObjectStore("h");
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function idbSet(k,val){ const d=await idb(); return new Promise((res,rej)=>{ const t=d.transaction("h","readwrite"); t.objectStore("h").put(val,k); t.oncomplete=res; t.onerror=()=>rej(t.error); }); }
async function idbGet(k){ const d=await idb(); return new Promise((res,rej)=>{ const t=d.transaction("h","readonly"); const g=t.objectStore("h").get(k); g.onsuccess=()=>res(g.result); g.onerror=()=>rej(g.error); }); }

function bkStatus(msg,ok){ const el=document.getElementById("bkStatus"); if(el){ el.textContent=msg; el.style.color=ok?"#b8e6b8":"#ffd9a0"; } }
function sanitizeName(n){ return (n||"client").replace(/[\\/:*?"<>|]/g,"-").trim(); }

async function setupBackup(){
  if(!window.showDirectoryPicker){ alert("Automatic folder backup needs Chrome or Edge. In this browser, please keep using the Backup data button."); return; }
  try{
    backupDir = await showDirectoryPicker({mode:"readwrite"});
    await idbSet("dir", backupDir);
    hasSavedDir=true;
    await writeBackup();
    alert("Auto-backup is on. Everything will now save to \""+backupDir.name+"\" — each client gets their own folder. If this folder is inside Google Drive for Desktop, it syncs to the cloud automatically.");
    refreshBackupUI();
  }catch(e){ if(e.name!=="AbortError") alert("Could not set up the folder: "+e.message); }
}
async function reconnectBackup(){
  const h = await idbGet("dir");
  if(!h){ setupBackup(); return; }
  hasSavedDir=true;
  const p = await h.requestPermission({mode:"readwrite"});
  if(p==="granted"){ backupDir=h; refreshBackupUI(); writeBackup(); }
  else refreshBackupUI();
}
function scheduleBackup(){
  if(!backupDir) return;
  clearTimeout(backupTimer);
  backupTimer=setTimeout(writeBackup,1500);
}
async function writeBackup(){
  if(!backupDir) return;
  try{
    /* master backup of everything */
    await writeFile(backupDir,"ALL-CLIENTS-master-backup.json",JSON.stringify(DB,null,2));
    /* one folder per client: data + readable summary */
    for(const c of DB.clients){
      const folder = await backupDir.getDirectoryHandle(sanitizeName(c.name),{create:true});
      await writeFile(folder, sanitizeName(c.name)+" - SDP data.json", JSON.stringify(c,null,2));
      await writeFile(folder, sanitizeName(c.name)+" - budget summary.txt", updateText(c));
    }
    bkStatus("✓ backed up "+new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),true);
    markBackedUp();
  }catch(e){
    bkStatus("⚠ backup failed — click to reconnect",false);
    console.warn("backup:",e);
  }
}
async function writeFile(dirHandle,name,content){
  const fh = await dirHandle.getFileHandle(name,{create:true});
  const w = await fh.createWritable();
  await w.write(content); await w.close();
}
function renderBackupBtn(){
  const b=document.getElementById("bkBtn"); if(!b) return;
  b.innerHTML = backupDir ? "📁 Auto-backup: ON ("+esc(backupDir.name)+")" : (hasSavedDir ? "📁 Reconnect auto-backup" : "📁 Set up auto-backup");
}
function refreshBackupUI(){ renderBackupBtn(); if(document.getElementById("view-dashboard")) renderDashboard(); }
async function initBackup(){
  if(!window.indexedDB || !window.showDirectoryPicker){ bkStatus("auto-backup needs Chrome/Edge",false); return; }
  try{
    const h = await idbGet("dir");
    if(!h){ hasSavedDir=false; bkStatus("auto-backup off",false); return; }
    hasSavedDir=true;
    const p = await h.queryPermission({mode:"readwrite"});
    if(p==="granted"){ backupDir=h; bkStatus("auto-backup ready",true); refreshBackupUI(); writeBackup(); }
    else { bkStatus("click to reconnect \""+h.name+"\"",false); refreshBackupUI(); }
  }catch(e){ bkStatus("auto-backup off",false); refreshBackupUI(); }
}
initBackup();
</script>

function formHtml(c,F){

    if(S.note) h+=`<p style="font-size:10.5px;font-style:italic">${S.note}</p>`;

      h+=`<table><tr>${S.rows.cols.map(x=>`<th>${x}</th>`).join("")}</tr>`;

function reqDocStatus(cid,k,val){ const c=getClient(cid); const d=docStore(c); if(!d.req[k])d.req[k]={}; d.req[k].status=val; if(val==="Received"&&!d.req[k].date)d.req[k].date=today(); save(); renderDocs(); renderDashboard(); }
function reqDocField(cid,k,f,val){ const c=getClient(cid); const d=docStore(c); if(!d.req[k])d.req[k]={}; d.req[k][f]=val; save(); }
async function saveDocFile(c,file,prefix){
  if(!backupDir) return null;
  const safe=(prefix?prefix+" - ":"")+file.name.replace(/[\\/:*?"<>|]/g,"-");
  const folder=await backupDir.getDirectoryHandle(sanitizeName(c.name),{create:true});
  const docs=await folder.getDirectoryHandle("Documents",{create:true});
  const fh=await docs.getFileHandle(safe,{create:true});
  const w=await fh.createWritable(); await w.write(file); await w.close();
  return safe;
}
async function uploadDoc(cid,k,input){
  const c=getClient(cid); const file=input.files[0]; if(!file) return;
  const d=docStore(c); if(!d.req[k])d.req[k]={};
  try{
    const stored=await saveDocFile(c,file,REQUIRED_DOCS.find(r=>r.k===k).l.slice(0,30));
    d.req[k].file=stored||file.name; d.req[k].storedOk=!!stored;
    d.req[k].status="Received"; d.req[k].date=today();
    if(!stored) alert("Marked as received. To store the file itself, connect 📁 auto-backup first, then upload again.");

async function addOtherDoc(cid){

}
function delOtherDoc(cid,i){ const c=getClient(cid); if(confirm("Remove this document entry? (The file stays in the backup folder.)")){ docStore(c).other.splice(i,1); save(); renderDocs(); } }
async function openDoc(cid,name){
  const c=getClient(cid);
  if(!backupDir){ alert("Connect 📁 auto-backup to open stored files."); return; }
  try{
    const folder=await backupDir.getDirectoryHandle(sanitizeName(c.name));
    const docs=await folder.getDirectoryHandle("Documents");

<script>
/* ================= IPP → PCP COORDINATION ================= */
const IPP_KEYS = {
 about:      ["strength","likes","admire","enjoys being","personality","background","lives with","diagnos"],
 importantTo:["important to","prefers","preference","enjoys","interest","likes to","chooses","favorite","hobb"],
 importantFor:["health","safety","medical","medication","risk","supervision","allerg","seizure","diet","mobility"],
 communication:["communicat","speech","language","verbal","nonverbal","sign language","device","gesture","express"],
 goals:      ["goal","outcome","objective","desired","would like to","wants to","will increase","will improve","will participate"],
 supports:   ["service","support","provider","respite","vendor","hours per","units","authorized","funded","program"],
 team:       ["mother","father","parent","sister","brother","family","circle of support","coordinator","conservator","guardian"],
 action:     ["responsible","by when","timeline","follow up","next steps","review date","target date"]
};
const IPP_CACHE = {};
function pcpSources(c){
  const out=[];
  if(c.pcp._ipptext) out.push({text:c.pcp._ipptext,src:"IPP"});
  if(c.pcp._notestext) out.push({text:c.pcp._notestext,src:"Notes"});
  return out;
}
function ippExcerpts(c){
  const sources=pcpSources(c);
  if(!sources.length) return {};
  const key=sources.map(s=>s.text.length+s.src).join("|");
  if(IPP_CACHE[c.id] && IPP_CACHE[c.id].key===key) return IPP_CACHE[c.id].map;
  const paras=[];
  sources.forEach(s=>{
    s.text.replace(/\r/g,"").split(/\n\s*\n|(?<=[.!?])\s{2,}|\n(?=[A-Z0-9•\-])/)
      .map(x=>x.replace(/\s+/g," ").trim()).filter(x=>x.length>40 && x.length<600)
      .forEach(p=>paras.push({p,src:s.src}));
  });
  const map={};
  Object.keys(IPP_KEYS).forEach(k=>{
    const scored=[];
    paras.forEach(x=>{
      const lc=x.p.toLowerCase();
      const score=IPP_KEYS[k].reduce((s,kw)=>s+(lc.includes(kw)?1:0),0);
      if(score>0) scored.push({...x,score});
    });
    scored.sort((a,b)=>b.score-a.score);
    map[k]=scored.slice(0,6);
  });
  IPP_CACHE[c.id]={key,map};
  return map;
}
function srcRow(c,kind,label,icon){
  const t=kind==="ipp"?c.pcp._ipptext:c.pcp._notestext;
  const nm=kind==="ipp"?c.pcp._ippname:c.pcp._notesname;
  const dt=kind==="ipp"?c.pcp._ippdate:c.pcp._notesdate;
  if(t) return `<div class="alert green" style="margin-bottom:8px">${icon} <strong>${label} loaded:</strong> ${esc(nm||"text")} (${Math.round(t.length/1000)}k chars, ${esc(dt||"")}) <button class="btn small secondary" onclick="clearIpp('${c.id}','${kind}')">Remove</button></div>`;
  return `<div style="border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px">
  <strong style="font-size:13px">${icon} ${label}</strong>
  <div class="row"><div><label>Upload (PDF or .txt)</label><input type="file" accept=".pdf,.txt" onchange="ippFile('${c.id}',this,'${kind}')"></div></div>
  <label>…or paste text${kind==="notes"?" (from Apple Notes: select all → copy → paste here)":""}</label>
  <textarea id="${kind}_paste" placeholder="${kind==="ipp"?"paste the IPP report text":"paste your PCP meeting notes"}"></textarea>
  <button class="btn small" onclick="ippPasteSave('${c.id}','${kind}')">Use pasted text</button></div>`;
}
function ippPanel(c){
  let h=`<div class="card" style="background:var(--blue-light)"><h3 class="mt0">📄 Source documents — feed them into this PCP</h3>
  <p class="muted">Add the IPP report and your PCP meeting notes. The builder scans both and lines up matching passages under each section below — click <em>Insert</em> to pull them in, then edit into person-centered language.</p>`;
  h+=srcRow(c,"ipp","IPP report","📄");
  h+=srcRow(c,"notes","PCP meeting notes","📝");
  h+=`<div class="alert blue" style="margin-top:6px">💡 <strong>Deeper analysis:</strong> the matching here is keyword-based. For real understanding, take both documents to <strong>Claude</strong>: <button class="btn small secondary" onclick="copyClaudePrompt('${c.id}')">Copy PCP-prep prompt</button> <button class="btn small secondary" onclick="copyPcpDeckPrompt('${c.id}')">Copy presentation prompt</button> — attach the IPP + notes and paste.</div></div>`;
  return h;
}
function ippHints(c,s){
  const map=ippExcerpts(c);
  const ex=map[s.k]||[];
  if(!ex.length) return "";
  let h=`<details style="margin:-6px 0 10px;background:var(--blue-light)"><summary style="font-size:12.5px">💡 From your documents — ${ex.length} matching passage${ex.length>1?"s":""}</summary><div>`;
  ex.forEach((x,i)=>{
    h+=`<p style="font-size:12.5px;margin:6px 0"><button class="btn small secondary" onclick="ippInsert('${c.id}','${s.k}',${i})">Insert ⤵</button> <span class="badge ${x.src==="IPP"?"blue":"green"}">${x.src==="IPP"?"📄 IPP":"📝 Notes"}</span> ${esc(x.p)}</p>`;
  });
  return h+`</div></details>`;
}
function ippInsert(cid,k,i){
  const c=getClient(cid);
  const ex=(ippExcerpts(c)[k]||[])[i]; if(!ex) return;
  c.pcp[k]=(c.pcp[k]?c.pcp[k]+"\n\n":"")+"[From "+ex.src+"] "+ex.p;
  save(); renderPCP();
}
function ippSetText(cid,text,name,kind){
  const c=getClient(cid);
  if(!text||text.trim().length<50){ alert("Couldn't find readable text — if it's a scanned PDF, paste the text instead."); return; }
  if(kind==="notes"){ c.pcp._notestext=text.slice(0,400000); c.pcp._notesname=name; c.pcp._notesdate=today(); }
  else { c.pcp._ipptext=text.slice(0,400000); c.pcp._ippname=name; c.pcp._ippdate=today(); }
  delete IPP_CACHE[cid];
  save(); renderPCP();
}
function clearIpp(cid,kind){
  const c=getClient(cid);
  if(kind==="notes"){ delete c.pcp._notestext; delete c.pcp._notesname; delete c.pcp._notesdate; }
  else { delete c.pcp._ipptext; delete c.pcp._ippname; delete c.pcp._ippdate; }
  delete IPP_CACHE[cid]; save(); renderPCP();
}
function ippPasteSave(cid,kind){ ippSetText(cid, document.getElementById((kind||"ipp")+"_paste").value, kind==="notes"?"pasted notes":"pasted text", kind||"ipp"); }
function ippFile(cid,input,kind){
  const f=input.files[0]; if(!f) return;
  kind=kind||"ipp";
  if(/\.txt$/i.test(f.name)){
    const r=new FileReader(); r.onload=()=>ippSetText(cid,r.result,f.name,kind); r.readAsText(f); return;
  }
  loadPdfJs().then(()=>{
    const r=new FileReader();
    r.onload=async()=>{
      try{
        const pdf=await pdfjsLib.getDocument({data:new Uint8Array(r.result)}).promise;
        let text="";
        for(let i=1;i<=pdf.numPages;i++){
          const pg=await pdf.getPage(i); const tc=await pg.getTextContent();
          text+=tc.items.map(x=>x.str).join(" ")+"\n\n";
        }
        ippSetText(cid,text,f.name,kind);
      }catch(e){ alert("Could not read that PDF ("+e.message+"). Paste the text instead."); }
    };
    r.readAsArrayBuffer(f);
  }).catch(()=>alert("PDF reading needs an internet connection the first time (to load the PDF library). Or paste the text instead."));
}

let _pdfjsP=null;
function loadPdfJs(){
  if(window.pdfjsLib) return Promise.resolve();
  if(_pdfjsP) return _pdfjsP;
  _pdfjsP=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{ pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"; res(); };
    s.onerror=rej;
    document.head.appendChild(s);
  });
  return _pdfjsP;
}
