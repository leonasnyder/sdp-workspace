    ${IMPORT.rows.slice(0,4).map(r=>`<tr>${heads.map((x,i)=>`<td>${esc(String(r[i]??""))}</td>`).join("")}</tr>`).join("")}</table>
    <p class="muted">Preview of first rows — check the mapping looks right, then import.</p>
    <button class="btn" onclick="doFmsImport('${c.id}')">Import spending</button>
    <button class="btn secondary" onclick="IMPORT=null;renderBudget()">Cancel</button>`;
  }
  return h+`</div>`;
}
function guessCol(heads,kws){
  for(const kw of kws){ const i=heads.findIndex(x=>String(x||"").toLowerCase().includes(kw)); if(i>=0) return i; }
  return 0;
}
function parseAmount(x){
  if(typeof x==="number") return x;
  let s=String(x||"").replace(/[$,\s]/g,"");
  let neg=/^\(.*\)$/.test(s); s=s.replace(/[()]/g,"");
  const n=parseFloat(s);
  return isNaN(n)?null:(neg?-n:n);
}
function parseDate(x){
  if(typeof x==="number" && x>25569 && x<70000){ /* excel serial */
    return new Date(Math.round((x-25569)*86400000)).toISOString().slice(0,10);
  }
  const d=new Date(String(x)); return isNaN(d)?"":d.toISOString().slice(0,10);
}
function parseCSV(text){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else if(ch==='"') q=true;
    else if(ch===","){ row.push(cur);cur=""; }
    else if(ch==="\n"||ch==="\r"){ if(cur!==""||row.length){row.push(cur);rows.push(row);row=[];cur="";} if(ch==="\r"&&text[i+1]==="\n")i++; }
    else cur+=ch;
  }
  if(cur!==""||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}
function fmsSheet(cid,input){
  const f=input.files[0]; if(!f) return;
  const c=getClient(cid);
  if(!c.plan.length && !/\.pdf$/i.test(f.name)){ alert("Add spending plan lines first — imported rows get matched to them. (Spending Summary PDFs create lines automatically.)"); return; }
  const setRows=(grid)=>{
    if(grid.length<2){ alert("Couldn't find data rows in that file."); return; }
    IMPORT={cid, name:f.name, headers:grid[0], rows:grid.slice(1)};
    renderBudget();
  };
  if(/\.pdf$/i.test(f.name)){
    loadPdfJs().then(()=>{
      const r=new FileReader();
      r.onload=async()=>{
        try{
          const pdf=await pdfjsLib.getDocument({data:new Uint8Array(r.result)}).promise;
          let text="";
          for(let i=1;i<=pdf.numPages;i++){
            const pg=await pdf.getPage(i); const tc=await pg.getTextContent();
            text+=tc.items.map(x=>x.str).join(" ")+"\n";
          }
          const parsed=parseSummaryPdf(text);
          if(!parsed){ alert("This PDF doesn't look like a Spending Summary report — I couldn't find 'Service Code Total' rows. If it's a scanned image, ask the FMS for the emailed version."); return; }
          PDFIMP={cid,name:f.name,...parsed};
          renderBudget();
        }catch(e){ alert("Could not read that PDF: "+e.message); }
      };
      r.readAsArrayBuffer(f);
    }).catch(()=>alert("PDF reading needs an internet connection the first time (to load the PDF library)."));
    return;
  }
  if(/\.csv$/i.test(f.name)){
    const r=new FileReader(); r.onload=()=>setRows(parseCSV(r.result)); r.readAsText(f);
  } else {
    loadSheetJs().then(()=>{
      const r=new FileReader();
      r.onload=()=>{
        try{
          const wb=XLSX.read(new Uint8Array(r.result),{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          setRows(XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""}));
        }catch(e){ alert("Could not read that spreadsheet ("+e.message+"). Try saving it as CSV and uploading that."); }
      };
      r.readAsArrayBuffer(f);
    }).catch(()=>alert("Reading .xlsx needs an internet connection the first time (to load the spreadsheet library). Or save the report as CSV — that works offline."));
  }
}
function doFmsImport(cid){
  const c=getClient(cid);
  const di=+v("imp_date"), ai=+v("imp_amt"), si=+v("imp_desc");
  const defLine=v("imp_line");
  let added=0, dup=0, skipped=0, bad=0;
  IMPORT.rows.forEach(r=>{
    const amt=parseAmount(r[ai]);
    if(amt===null||amt===0){ bad++; return; }
    const date=parseDate(r[di])||today();
    const desc=String(r[si]??"").trim();
    const fp=date+"|"+amt+"|"+desc.slice(0,40);
    if(c.expenses.some(e=>e.fp===fp)){ dup++; return; }
    /* match to plan line: service code in row, else keyword, else default */
    let item=null;
    const codeM=desc.match(/\b(3\d\d)\b/)||r.map(x=>String(x)).join(" ").match(/\b(3\d\d)\b/);
    if(codeM) item=c.plan.find(i=>i.code===codeM[1]);
    if(!item && /fms|fiscal/i.test(desc)) item=c.plan.find(i=>["315","316","317"].includes(i.code));
    if(!item){
      const lc=desc.toLowerCase();
      item=c.plan.find(i=>i.desc.toLowerCase().split(/[^a-z]+/).some(w=>w.length>4&&lc.includes(w)));
    }
    if(!item&&defLine) item=c.plan.find(i=>i.id===defLine);
    if(!item){ skipped++; return; }
    c.expenses.push({id:uid(),date,itemId:item.id,amount:amt,note:desc+" (imported: "+IMPORT.name+")",fp});
    added++;
  });
  IMPORT=null;
  save(); renderBudget(); renderDashboard();
  alert("Import done: "+added+" rows logged"+(dup?", "+dup+" already imported (skipped)":"")+(skipped?", "+skipped+" unmatched (skipped)":"")+(bad?", "+bad+" without a usable amount":"")+". Check the totals against the FMS report, then send the client update.");
}
let _sheetP=null;
function loadSheetJs(){
  if(window.XLSX) return Promise.resolve();
  if(_sheetP) return _sheetP;
  _sheetP=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
  return _sheetP;
}
</script>
<script>
/* ================= CFMS SPENDING SUMMARY (PDF) IMPORT ================= */
let PDFIMP=null; /* {cid,name,asOf,months[],rows[],budget} */
function catForCode(code){
  const n=+code;
  if(n>=310&&n<=330) return "Living Arrangement";
  if(n>=331&&n<=355) return "Employment & Community Participation";
  return "Health & Safety";
}
function parseSummaryPdf(text){
  const money=s=>parseFloat(s.replace(/[$,]/g,""));
  const asOfM=text.match(/Spending Summary as of (\d{2}\/\d{2}\/\d{4})/);
  const budM=text.match(/Total Budget Approved:?\s*\$([\d,]+\.\d\d)/);
  const nameM=text.match(/Participant Name:?\s*([A-Za-z .'-]+?)\s*(Participant|UCI|Total)/);
  const yrM=text.match(/SDP Year:?\s*(\d{2})\/(\d{2})\/(\d{4})\s*to\s*(\d{2})\/(\d{2})\/(\d{4})/);
  /* month header sequence e.g. "Sep 25 Oct 25 ... Jun 26" */
  const mm=[...text.matchAll(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s?(\d{2})\b/g)].map(x=>x[1]+" "+x[2]);
  const months=[]; for(const m of mm){ if(months.includes(m)){ if(months.length>=2) break; } else months.push(m); }
  const rows=[];
  const re=/(\d{3})\s+Service Code Total((?:\s+\$[\d,]+\.\d\d)+)/g;
  let m;
  while((m=re.exec(text))){
    const code=m[1];
    const vals=m[2].match(/\$[\d,]+\.\d\d/g).map(money);
    if(vals.length<5) continue;
    const authorized=vals[0], used=vals[vals.length-3], pending=vals[vals.length-2], avail=vals[vals.length-1];
    const monthly=vals.slice(1,vals.length-3);
    /* service name: text between "CODE " and "CODE Service Code Total" */
    const nm=text.match(new RegExp(code+"\\s+([A-Za-z][^$]{2,90}?)\\s+"+code+"\\s+(?:Service Code Total|Employee|Vendor)"));
    const sc=SERVICE_CODES.find(s=>s.code===code);
    rows.push({code, name:(nm?nm[1].trim():(sc?sc.name:"Service "+code)), authorized, monthly, used, pending, avail});
  }
  if(!rows.length) return null;
  return {asOf:asOfM?asOfM[1]:"", budget:budM?money("$"+budM[1]):0, participant:nameM?nameM[1].trim():"",
    sdpStart:yrM?yrM[3]+"-"+yrM[1]+"-"+yrM[2]:"", sdpEnd:yrM?yrM[6]+"-"+yrM[4]+"-"+yrM[5]:"", months, rows};
}
function monthToDate(label){
  const map={Jan:"01",Feb:"02",Mar:"03",Apr:"04",May:"05",Jun:"06",Jul:"07",Aug:"08",Sep:"09",Oct:"10",Nov:"11",Dec:"12"};
  const p=label.split(/\s+/);
  return "20"+p[1]+"-"+map[p[0]]+"-15";
}
function pdfSummaryPreview(c){
  const P=PDFIMP;
  let h=`<p><strong>${esc(P.name)}</strong> — Spending Summary as of <strong>${esc(P.asOf)}</strong>${P.participant?" for "+esc(P.participant):""}. Found ${P.rows.length} service codes across ${P.months.length} months:</p>
  <table><tr><th>Code</th><th>Service</th><th class="right">Authorized</th><th class="right">Used to date</th><th class="right">Pending</th><th class="right">Available</th></tr>`;
  P.rows.forEach(r=>{
    h+=`<tr><td>${r.code}</td><td>${esc(r.name)}</td><td class="right">${money(r.authorized)}</td><td class="right">${money(r.used)}</td><td class="right">${money(r.pending)}</td><td class="right">${money(r.avail)}</td></tr>`;
  });
  h+=`</table>
  <label style="display:flex;gap:8px;align-items:center;font-weight:400;margin:10px 0"><input type="checkbox" id="pdf_sync" checked style="width:18px;height:18px"> Also set each plan line's annual amount to the authorized amount from this report</label>
  ${P.budget&&c.budget&&Math.abs(P.budget-c.budget)>1?`<div class="alert amber">Report budget ${money(P.budget)} differs from the app's ${money(+c.budget)} — importing will update the client's budget to match the report.</div>`:""}
  <button class="btn" onclick="applySummaryPdf('${c.id}')">Apply to budget &amp; spending</button>
  <button class="btn secondary" onclick="PDFIMP=null;renderBudget()">Cancel</button>`;
  return h;
}
function applySummaryPdf(cid){
  const c=getClient(cid); const P=PDFIMP;
  const sync=document.getElementById("pdf_sync")?document.getElementById("pdf_sync").checked:true;
  let entries=0,newLines=0;
  P.rows.forEach(r=>{
    let item=c.plan.find(i=>i.code===r.code);
    if(!item){ item={id:uid(),code:r.code,cat:catForCode(r.code),desc:r.name,annual:r.authorized}; c.plan.push(item); newLines++; }
    if(sync) item.annual=r.authorized;
    item.pending=r.pending||0;
    r.monthly.forEach((amt,i)=>{
      const label=P.months[i]; if(label===undefined) return;
      const fp="PDFSUM|"+r.code+"|"+label;
      const ex=c.expenses.find(e=>e.fp===fp);
      if(ex){ if(ex.amount!==amt){ ex.amount=amt; ex.note=r.name+" — "+label+" (summary as of "+P.asOf+")"; entries++; } }
      else if(amt>0){ c.expenses.push({id:uid(),date:monthToDate(label),itemId:item.id,amount:amt,note:r.name+" — "+label+" (summary as of "+P.asOf+")",fp}); entries++; }
    });
  });
  if(P.budget) c.budget=P.budget;
  if(P.sdpStart) c.planStart=P.sdpStart;
  if(P.sdpEnd) c.planEnd=P.sdpEnd;
  c.lastSummary={asOf:P.asOf,file:P.name};
  PDFIMP=null;
  save(); renderBudget(); renderDashboard();
  alert("Spending Summary applied: "+entries+" monthly entries updated"+(newLines?", "+newLines+" plan lines created":"")+". Totals now match the report as of "+(c.lastSummary.asOf||"the report date")+". Pending amounts are shown on each line.");
}
</script>
<script>
/* ================= PLAN YEAR / REMAINING MONTHS ================= */
function monthsBetween(a,b){ return Math.max(0,(b-a)/(86400000*30.44)); }
function localDate(s){ const p=String(s).split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
function planYearInfo(c){
  if(!c.planStart||!c.planEnd) return null;
  const s=localDate(c.planStart), e=localDate(c.planEnd), n=new Date();
  const total=Math.round(monthsBetween(s,e));
  const remaining=Math.min(total,Math.ceil(monthsBetween(n,e)));
  const elapsed=Math.max(0,total-remaining);
  return {start:s,end:e,total,remaining,elapsed,over:n>e};
}
function fmtDate(d){ return (d.getMonth()+1)+"/"+d.getDate()+"/"+d.getFullYear(); }
function perMonthLeft(c,left){
  const py=planYearInfo(c);
  if(!py||py.remaining<1||left<=0) return "";
  return money(left/py.remaining)+"/mo";
}
function planYearCard(c){
  const py=planYearInfo(c);
  if(!py) return `<div class="alert amber">Add the plan year start &amp; end dates on the Clients tab (or import a Spending Summary PDF) to see months remaining and monthly spending power.</div>`;
  if(py.end<=py.start) return `<div class="alert red"><strong>Check the plan year dates:</strong> the start (${fmtDate(py.start)}) isn't before the end (${fmtDate(py.end)}) — likely a wrong year. Fix them on the Clients tab, or re-import the Spending Summary PDF to set them automatically.</div>`;
  if(new Date()<py.start) return `<div class="card" style="border-left:4px solid var(--blue)"><h3 class="mt0">📅 Plan year: ${fmtDate(py.start)} — ${fmtDate(py.end)}</h3><p>Hasn't started yet — ${py.total} months and ${money(c.budget-spentTotal(c))} ahead, about ${money(py.total>0?(c.budget-spentTotal(c))/py.total:0)}/month.</p></div>`;
  const rem=c.budget-spentTotal(c);
  const pm=py.remaining>0?rem/py.remaining:0;
  if(py.over) return `<div class="alert red"><strong>Plan year ended ${fmtDate(py.end)}.</strong> Time to renew the budget and spending plan.</div>`;
  return `<div class="card" style="border-left:4px solid var(--green)"><h3 class="mt0">📅 Plan year: ${fmtDate(py.start)} — ${fmtDate(py.end)}</h3>
  <div class="grid cols3">
    <div class="stat"><div class="num">${py.remaining}</div><div class="lbl">months remaining (of ${py.total})</div></div>
    <div class="stat"><div class="num">${money(rem)}</div><div class="lbl">left to spend</div></div>
    <div class="stat"><div class="num">${money(pm)}</div><div class="lbl">available per remaining month</div></div>
  </div>
  <div class="bar"><div style="width:${Math.round(py.elapsed/py.total*100)}%"></div></div>
  <p class="muted">${py.elapsed} of ${py.total} months used. Spending evenly, there's about ${money(pm)} to work with each month through ${fmtDate(py.end)}.</p></div>`;
}
</script>
<script>

  doc.autoTable({startY:27,head:[["Annual budget","Spent to date","Remaining","% used","% of year",py&&!py.over?"Months left":"", py&&!py.over&&py.remaining>0?"Avail / month":""].filter(x=>x!=="")],

  if(backupDir){

      const docs=await folder.getDirectoryHandle("Documents",{create:true});
      const fh=await docs.getFileHandle(fname,{create:true});

      const d=docStore(c); d.other=d.other.filter(o=>o.file!==fname);
      d.other.push({date:today(),cat:"Budget update (PDF)",note:"Sent to client",file:fname,stored:true});

  if(c.email && confirm("PDF "+where+".\n\nOpen the email now? (Attach the PDF to the email before sending — browsers can't attach it automatically.)")){

<script>
/* ================= GUIDED SPENDING PLAN BUILDER ================= */
const EMP_RATES={ss:0.062,ssCap:184500,med:0.0145,futa:0.006,futaBase:7000,ui:0.034,uiBase:7000,ett:0.001,ettBase:7000,wc:0.10,sick:0};
function spCat(code){const n=+code; if(n>=310&&n<=330)return"Living Arrangement"; if(n>=331&&n<=355)return"Employment & Community Participation"; return"Health & Safety";}
const FMS_SCHEDULE={ "Bill Payer (315)":[255,495,760], "Co-Employer (316)":[420,660,925], "Sole Employer (317)":[420,660,925] };
const FMS_TIERS=["0–4","5–10","11+"];
function spStore(c){ if(!c.splan) c.splan={budget:c.budget||0,rates:{...EMP_RATES},workers:[],items:[],fms:0,cert:{}}; if(!c.splan.rates)c.splan.rates={...EMP_RATES};
  if(!c.splan.rateBasis) c.splan.rateBasis="wage";
  if(!c.splan.burdenMethod) c.splan.burdenMethod="detailed";
  if(c.splan.flatPct===undefined) c.splan.flatPct=(c.fmsPct>0?(+c.fmsPct/100):0.25);
  if(c.splan.flatInclFms===undefined) c.splan.flatInclFms=true;
  if(!c.splan.fmsModel) c.splan.fmsModel="Co-Employer (316)";
  if(!c.splan.fmsSchedule) c.splan.fmsSchedule=JSON.parse(JSON.stringify(FMS_SCHEDULE));
  return c.splan; }
function fmsCount(c){ const sp=spStore(c); if(sp.fmsCountOverride!==undefined&&sp.fmsCountOverride!=="") return +sp.fmsCountOverride||0; return sp.workers.filter(w=>(+w.wage||0)>0).length; }
function fmsTierIndex(n){ return n<=4?0:(n<=10?1:2); }
function fmsMonthly(c){ const sp=spStore(c); const sched=sp.fmsSchedule[sp.fmsModel]||[0,0,0]; return sched[fmsTierIndex(fmsCount(c))]||0; }
function fmsAnnual(c){ const sp=spStore(c); if(sp.burdenMethod==="flat"&&sp.flatInclFms) return 0; return fmsMonthly(c)*12; }
function trueWagePerHr(w,sp){
  const entered=+w.wage||0;
  if(!sp||sp.rateBasis!=="loaded") return entered;
  const hrs=+w.hrs||0, weeks=+w.weeks||0, totalUnits=hrs*weeks;
  if(sp.burdenMethod==="flat"){ const pf=+sp.flatPct||0; return entered/(1+pf); }
  if(totalUnits<=0) return entered;
  const rt=(sp&&sp.rates)?sp.rates:EMP_RATES;
  const loadedAnnual=entered*totalUnits;
  const k=rt.ss+rt.med+rt.wc+rt.sick, cap=rt.futa+rt.ui+rt.ett, base=7000;
  let Wsmall=loadedAnnual/(1+k+cap);
  if(Wsmall<=base) return Wsmall/totalUnits;
  let Wbig=(loadedAnnual-base*cap)/(1+k);
  return Wbig/totalUnits;
}
function loadedCost(w,sp){
  const rt=(sp&&sp.rates)?sp.rates:(sp||EMP_RATES);
  const wph=trueWagePerHr(w,sp);
  const wages=wph*(+w.hrs||0)*(+w.weeks||0);
  if(!wages) return {wages:0,burden:0,loaded:0,pct:0};
  if(sp&&sp.burdenMethod==="flat"){ const pf=+sp.flatPct||0; const burden=wages*pf; return {wages,burden,loaded:wages+burden,pct:pf,ss:0,med:0,futa:0,ui:0,ett:0,wc:burden,sick:0}; }
  const ss=(rt.ssCap?Math.min(wages,rt.ssCap):wages)*rt.ss;
  const med=wages*rt.med;
  const futa=Math.min(wages,rt.futaBase)*rt.futa;
  const ui=Math.min(wages,rt.uiBase)*rt.ui;
  const ett=Math.min(wages,rt.ettBase)*rt.ett;
  const wc=wages*rt.wc, sick=wages*rt.sick;
  const burden=ss+med+futa+ui+ett+wc+sick;
  return {wages,burden,loaded:wages+burden,pct:burden/wages,ss,med,futa,ui,ett,wc,sick};
}
function itemAmount(it){
  if(it.rate!==undefined && it.rate!=="" && it.rate!==null){
    const u=(+it.units||0)*(+it.freq||0)*(+it.rate||0); return u+(+it.adj||0);
  }
  return +it.amount||0;
}
function rcWorkerRow(c,w){
  const sp=spStore(c), lc=loadedCost(w,sp);
  const totalUnits=(+w.hrs||0)*(+w.weeks||0);
  const empPerUnit=totalUnits>0?lc.burden/totalUnits:0;
  const adj=+w.adj||0;
  const wph=trueWagePerHr(w,sp);
  return {desc:(w.name||"Worker"),code:w.code||"320",units:(+w.hrs||0),unitType:(w.unitType||"Hours"),
    freqType:(w.freqType||"Week"),freq:(+w.weeks||0),totalUnits,rate:wph,
    empCost:empPerUnit,adjRate:wph+empPerUnit,adj,amount:lc.loaded+adj};
}
function rcItemRow(c,it){
  const hasUnit=(it.rate!==undefined&&it.rate!==""&&it.rate!==null);
  const units=hasUnit?(+it.units||0):1;
  const freq=hasUnit?(+it.freq||0):1;
  const rate=hasUnit?(+it.rate||0):(+it.amount||0);
  const totalUnits=units*freq;
  const adj=+it.adj||0;
  return {desc:(it.desc||""),code:it.code||"",units,unitType:(it.unitType||(hasUnit?"Each":"Lump sum")),
    freqType:(it.freqType||"Year"),freq,totalUnits,rate,empCost:0,adjRate:rate,adj,amount:itemAmount(it)};
}
const CA_MIN_WAGE=16.90; /* CA statewide minimum, 2026; many cities require more */
function splanFlags(c){
  const sp=spStore(c); const out=[];
  if(sp.burdenMethod==="flat"){
    const p=+sp.flatPct||0;
    if(p>0.40) out.push("The flat rate is "+Math.round(p*100)+"% — unusually high. Double-check it's what your FMS actually charges.");
    if(p>0 && p<0.05) out.push("The flat rate is only "+Math.round(p*100)+"% — that seems too low to cover employer taxes and workers' comp. Confirm it.");
  }
  sp.workers.forEach(w=>{
    if(!(+w.wage>0 && +w.hrs>0 && +w.weeks>0)) return;
    const nm=(w.name&&w.name.trim())?w.name.trim():"a worker";
    const wph=trueWagePerHr(w,sp);
    if(wph>0 && wph<CA_MIN_WAGE){
      if(sp.rateBasis==="loaded") out.push("Budget rate for "+nm+" backs out to a wage of "+money(wph)+"/hr — below California's "+money(CA_MIN_WAGE)+" minimum wage. The budget rate per hour is too low; raise it.");
      else out.push(nm+"'s wage of "+money(wph)+"/hr is below California's "+money(CA_MIN_WAGE)+" statewide minimum wage (many cities require more) — verify.");
    }
    const lc=loadedCost(w,sp);
    if(lc.wages>0 && sp.burdenMethod==="detailed"){
      const bp=lc.burden/lc.wages;
      if(bp>0.60) out.push("Employer cost for "+nm+" is "+Math.round(bp*100)+"% of wages — unusually high. Check the workers' comp rate in the rates section.");
    }
    const rc=rcWorkerRow(c,w);
    if(rc.rate>0 && rc.adjRate < rc.rate-0.001) out.push("Adjusted rate for "+nm+" is below the wage — check the numbers.");
  });
  return out;
}
function splanTotals(c){
  const sp=spStore(c);
  const wTot=sp.workers.reduce((s,w)=>s+rcWorkerRow(c,w).amount,0);
  const iTot=sp.items.reduce((s,i)=>s+itemAmount(i),0);
  const fms=fmsAnnual(c);
  const total=wTot+iTot+fms;
  return {wTot,iTot,fms,total,budget:+sp.budget||0,remaining:(+sp.budget||0)-total};
}
function renderSplan(){
  const el=document.getElementById("view-splan");
  let html=`<h2>Guided Spending Plan Builder</h2><p class="hint">Build a compliant SDP spending plan step by step — including the true cost of employed workers (wages + employer taxes + workers' comp) — then generate a submittable document. For heavy payroll math, the <a href="SDP-Spending-Plan-Builder.xlsx">Excel workbook</a> mirrors this (opens in Google Sheets).</p>${pickerHtml("splan")}`;
  const c=getClient(picked.splan);
  if(c){
    const sp=spStore(c); const t=splanTotals(c);
    /* STEP 1: budget */
    html+=`<div class="card"><h3 class="mt0">Step 1 · Certified individual budget</h3>
    <div class="row"><div><label>Annual budget ($)</label><input type="number" value="${sp.budget||''}" onchange="spField('${c.id}','budget',this.value)"></div>
    <div><label>Plan year</label><input value="${esc(c.planStart||'')} → ${esc(c.planEnd||'')}" disabled></div></div>
    <p class="muted">This comes from the RC certification (or the Budget tab). The plan total must not exceed it.</p></div>`;
    html+=splanImportCard(c);
    /* STEP 2: workers with burden */
    const flatOn=(sp.burdenMethod==="flat"); const flatPctN=Math.round((+sp.flatPct||0)*100);
    html+=`<div class="card"><h3 class="mt0">Step 2 · Employed workers (fully-loaded cost)</h3>
    <div class="row" style="align-items:flex-end">
      <div><label>Employer cost method</label><select onchange="spField('${c.id}','burdenMethod',this.value)">
        <option value="detailed" ${flatOn?'':'selected'}>Detailed — calculate actual employer taxes</option>
        <option value="flat" ${flatOn?'selected':''}>Flat % (e.g. Cambrian 25%)</option></select></div>
      <div><label>The $/hr you enter is</label><select onchange="spField('${c.id}','rateBasis',this.value)">
        <option value="wage" ${sp.rateBasis==='loaded'?'':'selected'}>Worker wage → add burden</option>
        <option value="loaded" ${sp.rateBasis==='loaded'?'selected':''}>Budget rate → back out wage</option></select></div>
      ${flatOn?`<div><label>Flat % on wages</label><input type="number" step="0.01" value="${sp.flatPct}" onchange="spField('${c.id}','flatPct',this.value)"><div class="muted" style="font-size:11px">${flatPctN}% added to wages</div></div>
      <div style="flex:2"><label style="display:flex;gap:6px;align-items:center;font-weight:400;font-size:13px"><input type="checkbox" ${sp.flatInclFms?'checked':''} onchange="spField('${c.id}','flatInclFms',this.checked)" style="width:16px;height:16px"> This % also covers the FMS fee (no separate FMS line)</label></div>`:''}
    </div>
    <p class="muted">${flatOn?('Flat method: each worker\'s employer cost = wages × '+flatPctN+'%'+(sp.flatInclFms?', which also absorbs the FMS fee — matching how Cambrian presents budgets.':'.')):"Detailed method: the app adds actual employer taxes + workers' comp to each worker's wages."}</p>
    ${sp.rateBasis==='loaded'?`<p class="muted" style="color:var(--blue-dark)">Budget-rate mode: the $/hr you type is the total the budget pays per hour (the Adjusted Rate). The app backs out the actual wage to pay the worker (shown under each rate) so the loaded cost equals what you entered.</p>`:''}
    <details style="margin-bottom:10px"><summary style="font-size:13px">❓ Which settings should I use?</summary><div class="muted" style="font-size:13px;line-height:1.6">
      <p><strong>Employer cost method:</strong> Use <strong>Flat %</strong> if your FMS (like Cambrian) budgets a single percentage that covers employer taxes + their fee — enter that % on the client's record and it fills in here. Use <strong>Detailed</strong> if you want the app to calculate the actual payroll taxes and workers' comp per worker.</p>

function spField(cid,k,v){ const c=getClient(cid); spStore(c)[k]=(k==='budget'||k==='fms'||k==='flatPct')?(+v||0):v; save(); renderSplan(); if(k==='budget')renderDashboard(); }
function spFmsRate(cid,model,tier,v){ const c=getClient(cid); const sp=spStore(c); sp.fmsSchedule[model][tier]=+v||0; save(); renderSplan(); }
function spRate(cid,k,v){ const c=getClient(cid); spStore(c).rates[k]=+v||0; save(); renderSplan(); }
function spAddWorker(cid){ const c=getClient(cid); spStore(c).workers.push({name:'',code:'320',wage:'',hrs:'',weeks:52,unitType:'Hours',freqType:'Week',adj:0}); save(); renderSplan(); }
function spWorker(cid,i,k,v){ const c=getClient(cid); const w=spStore(c).workers[i]; w[k]=(['wage','hrs','weeks','adj'].includes(k))?(+v||0):v; save(); renderSplan(); }
function spDelWorker(cid,i){ const c=getClient(cid); spStore(c).workers.splice(i,1); save(); renderSplan(); }
function spAddItem(cid){ const c=getClient(cid); spStore(c).items.push({code:'',desc:'',units:1,unitType:'Each',freq:1,rate:'',adj:0,amount:''}); save(); renderSplan(); }
function spItem(cid,i,k,v){ const c=getClient(cid); const it=spStore(c).items[i]; it[k]=(['amount','units','freq','rate','adj'].includes(k))?(v===''?'':(+v||0)):v; save(); renderSplan(); }
function spDelItem(cid,i){ const c=getClient(cid); spStore(c).items.splice(i,1); save(); renderSplan(); }
function spPlanHtml(c){
  const sp=spStore(c); const t=splanTotals(c);
  const cats={"Living Arrangement":[],"Employment & Community Participation":[],"Health & Safety":[]};
  sp.workers.forEach(w=>{ const lc=loadedCost(w,sp); if(lc.loaded>0) cats[spCat(w.code||'320')].push([w.code||'320',(w.name||'Worker')+" — "+(w.hrs)+" hr/wk @ "+money(w.wage)+"/hr (fully loaded, incl. employer taxes)",lc.loaded]); });
  sp.items.forEach(i=>{ if(+i.amount>0) cats[spCat(i.code||'356')].push([i.code||'',i.desc||'',+i.amount]); });
  let h=`<h1>SDP Spending Plan — ${esc(c.name)}</h1>
  <p>Regional center: ${esc(c.rc||'—')} · Plan year ${esc(c.planStart||'____')} to ${esc(c.planEnd||'____')} · Prepared ${new Date().toLocaleDateString()}</p>
  <p>Certified individual budget: <strong>${money(t.budget)}</strong></p>`;
  const catRows={"Living Arrangement":[],"Employment & Community Participation":[],"Health & Safety":[]};
  sp.workers.forEach(w=>{ const rc=rcWorkerRow(c,w); if(rc.amount>0) catRows[spCat(w.code||'320')].push(rc); });
  sp.items.forEach(it=>{ const rc=rcItemRow(c,it); if(rc.amount>0) catRows[spCat(it.code||'356')].push(rc); });
  const cols=["Code","Description / Provider","# Units","Type","Freq/yr","Total Yearly Units","Rate","Employer Cost","Adjusted Rate","1-Time Fees","Amount (12 mo)"];
  Object.keys(catRows).forEach(cat=>{
    if(!catRows[cat].length) return;
    const sub=catRows[cat].reduce((s,r)=>s+r.amount,0);
    h+=`<h2>${cat}</h2><table style="font-size:11px"><tr>${cols.map(x=>`<th>${x}</th>`).join('')}</tr>`;
    catRows[cat].forEach(r=>{
      h+=`<tr><td>${esc(r.code)}</td><td>${esc(r.desc)}</td><td>${r.units||''}</td><td>${esc(r.unitType)}</td><td>${r.freq||''}</td><td>${r.totalUnits||''}</td><td>${money(r.rate)}</td><td>${money(r.empCost)}</td><td>${money(r.adjRate)}</td><td>${money(r.adj)}</td><td>${money(r.amount)}</td></tr>`;
    });
    h+=`<tr><td colspan="10" style="text-align:right"><strong>Subtotal</strong></td><td><strong>${money(sub)}</strong></td></tr></table>`;
  });
  h+=`<h2>Required program lines</h2><table><tr><td>${esc((sp.fmsModel.match(/(3\d\d)/)||['','316'])[1])}</td><td>Financial Management Services — ${esc(sp.fmsModel)} (${fmsCount(c)} employees/providers)</td><td>${money(t.fms)}</td></tr>
  <tr><td>340</td><td>Independent Facilitator (paid by RC outside the budget)</td><td>n/a</td></tr></table>
  <h2>Totals</h2><table>
  <tr><td>Spending plan total</td><td><strong>${money(t.total)}</strong></td></tr>
  <tr><td>Individual budget</td><td>${money(t.budget)}</td></tr>
  <tr><td>Remaining</td><td>${money(t.remaining)}</td></tr>
  <tr><td>Status</td><td><strong>${t.total<=t.budget&&t.budget>0?'Within budget':(t.budget>0?'OVER BUDGET':'—')}</strong></td></tr></table>
  <p style="font-size:11px">Employed-worker amounts are fully loaded (wages + employer payroll taxes + workers' compensation), per the requirement to budget the full cost of a worker. This plan meets WIC §4685.8: each item addresses an IPP outcome, is not available from generic services, and is FFP-eligible. A copy is to be attached to the IPP.</p>`;
  return h;
}
function spPrint(cid){ doPrint(spPlanHtml(getClient(cid))); }
function rcTemplateXlsx(cid){
  const c=getClient(cid); const sp=spStore(c); const t=splanTotals(c);
  loadSheetJs().then(()=>{
    const H=["DESCRIPTION/PROVIDER NAME","# OF UNITS","TYPE OF UNITS/FREQUENCY","FREQUENCY (# OF WEEKS/MONTHS/YEAR)","TOTAL YEARLY UNITS","RATE","EMPLOYER COST","ADJUSTED RATE","ADJUSTMENTS / ONE-TIME FEES","AMOUNT PAID IN 12 MO PERIOD"];
    const aoa=[];
    aoa.push(["SDP Spending Plan — "+(c.name||"")]);
    aoa.push(["Regional Center: "+(c.rc||""),"UCI#:","","Plan Year: "+(c.planStart||"")+" to "+(c.planEnd||"")]);
    aoa.push(["Certified Individual Budget:",t.budget]);
    aoa.push([]);
    const cats={"Living Arrangement (310-330)":[],"Employment & Community Participation (331-355)":[],"Health & Safety (356-399)":[]};
    const key=code=>{const n=+code; return n>=310&&n<=330?"Living Arrangement (310-330)":(n>=331&&n<=355?"Employment & Community Participation (331-355)":"Health & Safety (356-399)");};
    sp.workers.forEach(w=>{ const r=rcWorkerRow(c,w); if(r.amount>0) cats[key(w.code||'320')].push(r); });
    sp.items.forEach(it=>{ const r=rcItemRow(c,it); if(r.amount>0) cats[key(it.code||'356')].push(r); });
    let grand=0;
    Object.keys(cats).forEach(cat=>{
      aoa.push([cat]);
      aoa.push(H);
      let sub=0;
      cats[cat].forEach(r=>{
        aoa.push([r.desc, r.units||"", r.unitType, r.freqType+" ("+(r.freq||"")+")", r.totalUnits||"", round2(r.rate), round2(r.empCost), round2(r.adjRate), round2(r.adj), round2(r.amount)]);
        sub+=r.amount;
      });
      aoa.push(["Subtotal","","","","","","","","",round2(sub)]);
      aoa.push([]);
      grand+=sub;
    });
    aoa.push(["Financial Management Services — "+sp.fmsModel+" ("+fmsCount(c)+" employees/providers)","","","Monthly x 12","","",fmsMonthly(c),"","",round2(fmsAnnual(c))]);
    aoa.push(["Independent Facilitator (code 340) — paid by RC OUTSIDE the individual budget","","","","","","","","","n/a"]);
    aoa.push([]);
    aoa.push(["SPENDING PLAN TOTAL","","","","","","","","",round2(t.total)]);
    aoa.push(["INDIVIDUAL BUDGET","","","","","","","","",round2(t.budget)]);
    aoa.push(["REMAINING","","","","","","","","",round2(t.remaining)]);
    aoa.push(["STATUS","","","","","","","","", t.total<=t.budget&&t.budget>0?"Within budget":(t.budget>0?"OVER BUDGET":"—")]);
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:42},{wch:9},{wch:16},{wch:20},{wch:12},{wch:11},{wch:13},{wch:12},{wch:14},{wch:16}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Spending Plan");
    XLSX.writeFile(wb,"SDP Spending Plan - "+sanitizeName(c.name)+".xlsx");
  }).catch(()=>alert("Generating the spreadsheet needs an internet connection the first time (to load the spreadsheet engine). Try again when online, or use Print / Copy for Google Docs."));
}
function round2(n){ return Math.round((+n||0)*100)/100; }
function spPreview(cid){ showPreview(spPlanHtml(getClient(cid)),null); }
function spCopyForDocs(cid){
  const c=getClient(cid); const tmp=document.createElement("div"); tmp.innerHTML=spPlanHtml(c);

function spToBudget(cid){
  const c=getClient(cid); const sp=spStore(c);
  if(!confirm("Add these spending plan lines to the Budget tab for tracking?")) return;
  sp.workers.forEach(w=>{ const lc=loadedCost(w,sp); if(lc.loaded>0) c.plan.push({id:uid(),code:w.code||'320',cat:spCat(w.code||'320'),desc:(w.name||'Worker')+' (loaded)',annual:Math.round(lc.loaded*100)/100}); });
  sp.items.forEach(i=>{ if(+i.amount>0) c.plan.push({id:uid(),code:i.code||'',cat:spCat(i.code||'356'),desc:i.desc||'',annual:+i.amount}); });
  const fa=fmsAnnual(c); if(fa>0){ const fcode=(sp.fmsModel.match(/(3\d\d)/)||['','316'])[1]; c.plan.push({id:uid(),code:fcode,cat:'Living Arrangement',desc:'FMS ('+sp.fmsModel+') annual fee',annual:fa}); }
  if(+sp.budget>0) c.budget=+sp.budget;
  save(); renderBudget(); renderDashboard(); alert("Added to the Budget tab.");
}
</script>
<script>
/* ================= IMPORT EXISTING SPENDING PLAN (xlsx/csv/pdf) ================= */
function splanImportCard(c){
  return `<div class="card" style="background:var(--blue-light)"><h3 class="mt0">📥 Start from an existing spending plan</h3>
  <p class="muted">Upload a current spending plan or authorization — <strong>.xlsx, .csv, or PDF</strong> — and the app reads the service codes and amounts into Step 3 below. CFMS/Regional-Center "Spending Summary" PDFs work too (it uses the authorized amount per code). Review and adjust after importing; move any employed-worker lines into Step 2 to recalculate their loaded cost.</p>
  <div class="row"><div><label>Spending plan file</label><input type="file" accept=".xlsx,.xls,.csv,.pdf" onchange="splanImportFile('${c.id}',this)"></div></div>
  <div id="splanImpMsg" class="muted"></div></div>`;
}
function splanImpMsg(txt,ok){ const el=document.getElementById("splanImpMsg"); if(el){ el.textContent=txt; el.style.color=ok?"var(--green)":"var(--muted)"; } }
function splanAddImported(c,rows){
  const sp=spStore(c); let added=0;
  rows.forEach(r=>{
    const code=String(r.code||"").match(/\b(3\d\d)\b/); const amt=+r.amount||0;
    if(!amt) return;
    sp.items.push({code:code?code[1]:"",desc:(r.desc||"").slice(0,80),amount:Math.round(amt*100)/100});
    added++;
  });
  save(); renderSplan();
  const msg=document.getElementById("splanImpMsg");
  if(msg){ msg.textContent="✓ Imported "+added+" line(s) into Step 3. Review amounts, then move any worker lines up to Step 2 for loaded-cost calculation."; msg.style.color="var(--green)"; }
}
function splanImportFile(cid,input){
  const f=input.files[0]; if(!f) return; const c=getClient(cid);
  splanImpMsg("Reading "+f.name+"…",true);
  if(/\.pdf$/i.test(f.name)){
    loadPdfJs().then(()=>{
      const r=new FileReader();
      r.onload=async()=>{
        try{
          const pdf=await pdfjsLib.getDocument({data:new Uint8Array(r.result)}).promise;
          let text=""; for(let i=1;i<=pdf.numPages;i++){ const pg=await pdf.getPage(i); const tc=await pg.getTextContent(); text+=tc.items.map(x=>x.str).join(" ")+"\n"; }
          const parsed=(typeof parseSummaryPdf==="function")?parseSummaryPdf(text):null;
          if(parsed&&parsed.rows&&parsed.rows.length){
            if(parsed.budget && !spStore(c).budget){ spStore(c).budget=parsed.budget; }
            splanAddImported(c, parsed.rows.map(x=>({code:x.code,desc:x.name,amount:x.authorized||x.used||0})));
            return;
          }
          /* fallback: scan text for "CODE ... $amount" patterns */
          const rows=[]; const re=/\b(3\d\d)\b[^$\n]{0,80}?\$([\d,]+\.\d\d)/g; let m;
          while((m=re.exec(text))){ rows.push({code:m[1],desc:"code "+m[1],amount:+m[2].replace(/,/g,"")}); }
          if(rows.length) splanAddImported(c,rows);
          else splanImpMsg("Couldn't find service-code amounts in that PDF. If it's a scan, export the spreadsheet version instead.",false);
        }catch(e){ splanImpMsg("Could not read that PDF ("+e.message+"). Try the spreadsheet version.",false); }
      };
      r.readAsArrayBuffer(f);
    }).catch(()=>splanImpMsg("PDF reading needs internet the first time (to load the reader). Or upload a .csv/.xlsx.",false));
    return;
  }
  const handleGrid=(grid)=>{
    if(!grid||grid.length<2){ splanImpMsg("No rows found in that file.",false); return; }
    const heads=grid[0].map(x=>String(x||"").toLowerCase());
    const codeCol=heads.findIndex(x=>x.includes("code")||x.includes("service"));
    let amtCol=heads.findIndex(x=>x.includes("authorized")||x.includes("annual")||x.includes("amount")||x.includes("total")||x.includes("cost"));
    const descCol=heads.findIndex(x=>x.includes("desc")||x.includes("provider")||x.includes("service"));
    const rows=[];
    grid.slice(1).forEach(g=>{
      const joined=g.map(x=>String(x)).join(" ");
      const codeM=(codeCol>=0?String(g[codeCol]):joined).match(/\b(3\d\d)\b/);
      let amt=null;
      if(amtCol>=0) amt=(typeof parseAmount==="function")?parseAmount(g[amtCol]):parseFloat(String(g[amtCol]).replace(/[$,]/g,""));
      if(!amt){ /* take the largest currency-looking number in the row */
        const nums=g.map(x=>{const n=parseFloat(String(x).replace(/[$,]/g,""));return isNaN(n)?0:n;}); amt=Math.max(...nums,0);
      }
      if(codeM && amt>0) rows.push({code:codeM[1],desc:(descCol>=0?String(g[descCol]):"code "+codeM[1]),amount:amt});
    });
    if(rows.length) splanAddImported(c,rows);
    else splanImpMsg("Couldn't match service codes + amounts. Make sure a column has codes (310–399) and another has dollar amounts.",false);
  };
  if(/\.csv$/i.test(f.name)){ const r=new FileReader(); r.onload=()=>handleGrid((typeof parseCSV==="function")?parseCSV(r.result):[]); r.readAsText(f); return; }
  loadSheetJs().then(()=>{ const r=new FileReader(); r.onload=()=>{ try{ const wb=XLSX.read(new Uint8Array(r.result),{type:"array"}); handleGrid(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,defval:""})); }catch(e){ splanImpMsg("Could not read that spreadsheet: "+e.message,false); } }; r.readAsArrayBuffer(f); })
    .catch(()=>splanImpMsg("Reading .xlsx needs internet the first time. Or save as .csv and upload that.",false));
}
</script>
<script>renderAll();</script>
